        function _timeUntilAlarm(alarmStr, idx) {
            if (Array.isArray(alarmEnabled) && alarmEnabled[idx] === false) return Infinity;
            const now = new Date();
            const parsed = _parseAlarmString(alarmStr);
            if (!parsed) return Infinity;
            
            const todayDayIndex = now.getDay();
            const allowedDays = _getRepeatDaysForAlarm(idx);
            const noRepeatDays = !Array.isArray(allowedDays) || allowedDays.length === 0;
            
            let alarmTime = new Date();
            alarmTime.setHours(parsed.hh, parsed.mm, 0, 0);
            
            let timeMs = alarmTime - now;

            if (noRepeatDays) {
                // "Never" means one-time: next occurrence only.
                if (timeMs <= 0) {
                    alarmTime.setDate(alarmTime.getDate() + 1);
                    timeMs = alarmTime - now;
                }
                return Math.max(0, timeMs);
            }

            if (timeMs <= 0 || !allowedDays.includes(todayDayIndex)) {
                let daysAhead = 1;
                let nextDayIndex = (todayDayIndex + daysAhead) % 7;
                while (!allowedDays.includes(nextDayIndex) && daysAhead < 7) {
                    daysAhead++;
                    nextDayIndex = (todayDayIndex + daysAhead) % 7;
                }
                alarmTime.setDate(alarmTime.getDate() + daysAhead);
                timeMs = alarmTime - now;
            }
            
            return Math.max(0, timeMs);
        }

        function _isAlarmImminent(index, alarmStr) {
            const isEnabled = !(Array.isArray(alarmEnabled) && alarmEnabled[index] === false);
            if (!isEnabled) return false;
            if (_currentRingingIndexes.includes(index)) return false;
            const fireKey = _alarmFireKey(index);
            if (_alarmsFiredOn[fireKey] === _todayKey()) return false;
            return _timeUntilAlarm(alarmStr, index) < 300000;
        }

        function _scrollWheelToValue(wheelId, value) {
            const wheel = document.getElementById(wheelId);
            if (!wheel) return;
            const items = _getWheelItems(wheel);
            const allMatches = items.filter(el => String(el.dataset.wheelValue || el.textContent || '').trim() === String(value));
            if (!allMatches.length) return;
            const middleStart = Number(wheel.dataset.wheelMiddleStart);
            let target = allMatches[0];
            if (Number.isFinite(middleStart)) {
                target = allMatches.reduce((best, current) => {
                    const bestIdx = items.indexOf(best);
                    const curIdx = items.indexOf(current);
                    if (bestIdx < 0) return current;
                    if (curIdx < 0) return best;
                    return Math.abs(curIdx - middleStart) < Math.abs(bestIdx - middleStart) ? current : best;
                }, allMatches[0]);
            }
            _centerWheelOnItem(wheel, target, 'auto');
            _setWheelActiveItem(wheel, target);
        }

        function _updateAlarmEditActions() {
            const setBtn = document.getElementById('set-alarm-btn');
            const undoBtn = document.getElementById('undo-edit-alarm-btn');
            const isEditing = Number.isInteger(editingAlarmIndex) && editingAlarmIndex >= 0 && editingAlarmIndex < alarms.length;
            if (setBtn) {
                setBtn.textContent = isEditing ? 'Save Changes' : 'Set New Alarm';
            }
            if (undoBtn) {
                undoBtn.style.display = isEditing ? 'block' : 'none';
            }
            _syncAlarmCommitButtonLimitState();
        }

        function editAlarm(index) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length) return;
            _renamingAlarmIndex = null;
            editingAlarmIndex = index;
            originalAlarmDraft = {
                index,
                alarm: String(alarms[index] || ''),
                repeatDays: _getRepeatDaysForAlarm(index),
                type: (alarmTypes && alarmTypes[index]) ? alarmTypes[index] : 'routine',
                enabled: !(Array.isArray(alarmEnabled) && alarmEnabled[index] === false)
            };
            _closeRepeatPopover();
            _updateAlarmEditActions();
            setAlarmComposerOpen(true, { scrollIntoView: false });

            const parsed = _parseAlarmString(alarms[index] || '');
            if (parsed) {
                let displayHour = parsed.hh % 12;
                if (displayHour === 0) displayHour = 12;
                const displayMinute = String(parsed.mm).padStart(2, '0');
                const displayPeriod = parsed.hh >= 12 ? 'PM' : 'AM';
                _scrollWheelToValue('h-wheel', String(displayHour));
                _scrollWheelToValue('m-wheel', displayMinute);
                setCreatorPeriodSelection(displayPeriod);
            }

            const selectedDays = _getRepeatDaysForAlarm(index);
            if (Array.isArray(selectedDays) && selectedDays.length > 0) {
                const dayLabel = selectedDays.length === 7
                    ? EVERY_DAY_LABEL
                    : DAY_LABELS[selectedDays[0]];
                setCreatorDaySelection(dayLabel);
            }
            selectedAlarmType = (alarmTypes && alarmTypes[index]) ? alarmTypes[index] : 'routine';
            setAlarmType(selectedAlarmType);
            _syncHomeClockWithCreatorSelection();

            /* ===== ALARM LAYOUT (SINGLE SCROLL) START ===== */
            _scrollAlarmPickerIntoView();
            /* ===== ALARM LAYOUT (SINGLE SCROLL) END ===== */
        }

        function undoAlarmEdits() {
            if (!(Number.isInteger(editingAlarmIndex) && editingAlarmIndex >= 0 && editingAlarmIndex < alarms.length)) return;
            const idx = editingAlarmIndex;
            if (originalAlarmDraft && originalAlarmDraft.index === idx) {
                alarms[idx] = String(originalAlarmDraft.alarm || '');
                alarmsRepeatDays[idx] = _normalizeRepeatDays(originalAlarmDraft.repeatDays);
                alarmsMeta[idx] = _formatRepeatDays(alarmsRepeatDays[idx]);
                alarmTypes[idx] = originalAlarmDraft.type === 'regular' ? 'regular' : 'routine';
                if (Array.isArray(alarmEnabled) && idx >= 0 && idx < alarmEnabled.length) {
                    alarmEnabled[idx] = originalAlarmDraft.enabled !== false;
                }
            }

            const restored = _parseAlarmString(alarms[idx] || '');
            if (restored) {
                let displayHour = restored.hh % 12;
                if (displayHour === 0) displayHour = 12;
                _scrollWheelToValue('h-wheel', String(displayHour));
                _scrollWheelToValue('m-wheel', String(restored.mm).padStart(2, '0'));
                setCreatorPeriodSelection(restored.hh >= 12 ? 'PM' : 'AM');
            }
            const restoredDays = _getRepeatDaysForAlarm(idx);
            const restoredDayLabel = Array.isArray(restoredDays) && restoredDays.length === 7
                ? EVERY_DAY_LABEL
                : DAY_LABELS[restoredDays[0] ?? 0];
            setCreatorDaySelection(restoredDayLabel);
            selectedAlarmType = (alarmTypes && alarmTypes[idx]) ? alarmTypes[idx] : 'routine';
            setAlarmType(selectedAlarmType);

            editingAlarmIndex = null;
            originalAlarmDraft = null;
            _closeRepeatPopover();
            setAlarmComposerOpen(false, { scrollIntoView: false });
            renderAlarms();
            saveState();
        }

        function _closeRepeatPopover() {
            if (_repeatPopover && _repeatPopover.parentNode) {
                _repeatPopover.parentNode.removeChild(_repeatPopover);
            }
            _repeatPopover = null;
            _openRepeatEditorIndex = null;
            _openSoundEditorIndex = null;
        }

        function _ensureRepeatPopover() {
            if (_repeatPopover && _repeatPopover.parentNode) return _repeatPopover;
            _repeatPopover = document.createElement('div');
            _repeatPopover.className = 'alarm-repeat-popover';
            _repeatPopover.addEventListener('click', (evt) => evt.stopPropagation());
            document.body.appendChild(_repeatPopover);
            return _repeatPopover;
        }

        function _positionRepeatPopover(anchorEl, popoverEl) {
            const anchorRect = anchorEl.getBoundingClientRect();
            const margin = 10;
            const top = Math.min(window.innerHeight - popoverEl.offsetHeight - margin, anchorRect.bottom + 8);
            const left = Math.min(window.innerWidth - popoverEl.offsetWidth - margin, Math.max(margin, anchorRect.left));
            popoverEl.style.top = `${Math.max(margin, top)}px`;
            popoverEl.style.left = `${Math.max(margin, left)}px`;
        }

        function _renderRepeatPopoverForAlarm(index, anchorEl) {
            const popover = _ensureRepeatPopover();
            const checked = new Set(_getRepeatDaysForAlarm(index));
            popover.innerHTML = `
                <div class="alarm-repeat-popover-title">Repeat Days</div>
                ${DAY_LABELS.map((label, dayIdx) => `
                    <label class="day-check">
                        <input type="checkbox" data-day-index="${dayIdx}" ${checked.has(dayIdx) ? 'checked' : ''}>
                        <span>${label}</span>
                    </label>
                `).join('')}
                <button type="button" class="alarm-repeat-popover-done">Done</button>
            `;
            _positionRepeatPopover(anchorEl, popover);
            _openRepeatEditorIndex = index;

            popover.querySelectorAll('input[type="checkbox"]').forEach(input => {
                input.addEventListener('change', () => {
                    const selected = Array.from(popover.querySelectorAll('input[type="checkbox"]'))
                        .filter(el => el.checked)
                        .map(el => Number(el.dataset.dayIndex))
                        .filter(v => Number.isInteger(v) && v >= 0 && v <= 6)
                        .sort((a, b) => a - b);
                    alarmsRepeatDays[index] = _normalizeRepeatDays(selected);
                    alarmsMeta[index] = _formatRepeatDays(alarmsRepeatDays[index]);
                    const labelEl = document.querySelector(`.alarm-repeat-inline-trigger[data-alarm-idx="${index}"] .alarm-repeat-label`);
                    if (labelEl) labelEl.textContent = `Repeating: ${alarmsMeta[index]}`;
                    saveState();
                });
            });

            const doneBtn = popover.querySelector('.alarm-repeat-popover-done');
            if (doneBtn) doneBtn.onclick = () => _closeRepeatPopover();
        }

        function openRepeatEditor(index, triggerEl) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length || !triggerEl) return;
            if (_openRepeatEditorIndex === index) {
                _closeRepeatPopover();
                return;
            }
            _closeRepeatPopover();
            _renderRepeatPopoverForAlarm(index, triggerEl);
        }

        function _renderSoundPopoverForAlarm(index, anchorEl) {
            const popover = _ensureRepeatPopover();
            const selectedId = _getAlarmSoundId(index);
            popover.innerHTML = `
                <div class="alarm-repeat-popover-title">Alarm Sound</div>
                ${SOUND_OPTIONS.map(sound => `
                    <label class="day-check">
                        <input type="checkbox" data-sound-id="${String(sound.id || '').replace(/"/g, '&quot;')}" ${selectedId === sound.id ? 'checked' : ''}>
                        <span>${String(sound.name || 'Sound')}</span>
                    </label>
                `).join('')}
                <button type="button" class="alarm-repeat-popover-done">Done</button>
            `;
            _positionRepeatPopover(anchorEl, popover);
            _openSoundEditorIndex = index;

            const checkboxes = Array.from(popover.querySelectorAll('input[type="checkbox"]'));
            checkboxes.forEach(input => {
                input.addEventListener('change', () => {
                    checkboxes.forEach(other => {
                        if (other !== input) other.checked = false;
                    });
                    if (!input.checked) input.checked = true;
                    alarmSoundIds[index] = _normalizeAlarmSoundId(input.dataset.soundId);
                    const labelEl = document.querySelector(`.alarm-sound-trigger[data-alarm-idx="${index}"] .alarm-repeat-label`);
                    if (labelEl) labelEl.textContent = `Sound: ${_getSoundNameById(alarmSoundIds[index])}`;
                    saveState();
                });
            });

            const doneBtn = popover.querySelector('.alarm-repeat-popover-done');
            if (doneBtn) doneBtn.onclick = () => _closeRepeatPopover();
        }

        function openSoundEditor(index, triggerEl) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length || !triggerEl) return;
            if (_openSoundEditorIndex === index) {
                _closeRepeatPopover();
                return;
            }
            _closeRepeatPopover();
            _renderSoundPopoverForAlarm(index, triggerEl);
        }

        function initRepeatPopoverDismiss() {
            document.addEventListener('click', (evt) => {
                if (!_repeatPopover) return;
                if (evt.target.closest('.alarm-repeat-popover')) return;
                if (evt.target.closest('.alarm-repeat-trigger')) return;
                if (evt.target.closest('.alarm-sound-trigger')) return;
                _closeRepeatPopover();
            });
            window.addEventListener('resize', () => { if (_repeatPopover) _closeRepeatPopover(); });
            window.addEventListener('scroll', () => { if (_repeatPopover) _closeRepeatPopover(); }, { passive: true });
        }

        function renderAlarms() {
            const list = document.getElementById('alarm-list');
            if (!list) return;
            list.innerHTML = alarms.map((a, i) => {
                const alarmName = _normalizeAlarmName(alarmNames[i], i);
                const isRenaming = _renamingAlarmIndex === i;
                const repeatLabel = _formatRepeatDays(_getRepeatDaysForAlarm(i));
                const soundLabel = _getSoundNameById(_getAlarmSoundId(i));
                const alarmType = (alarmTypes && alarmTypes[i]) ? alarmTypes[i] : 'routine';
                const isEnabled = !(Array.isArray(alarmEnabled) && alarmEnabled[i] === false);
                const typeLabel = alarmType === 'routine' ? 'Routine' : 'Regular';
                const typeColor = alarmType === 'routine' ? 'var(--sun-main)' : 'var(--accent-blue)';
                const isCloseToRinging = _isAlarmImminent(i, a);
                const rowDisabledStyle = !isEnabled ? 'background:rgba(130,130,130,0.12); border:1px solid rgba(180,180,180,0.2);' : '';
                const contentDisabledStyle = !isEnabled ? 'opacity:0.46; filter:grayscale(1);' : '';
                const nameTextDisabledStyle = !isEnabled ? 'opacity:0.46; filter:grayscale(1);' : '';
                const isExpanded = _expandedAlarmIndex === i;
                return `
                <div class="alarm-row${isCloseToRinging ? ' alarm-imminent' : ''}" data-alarm-idx="${i}" style="border:1px solid rgba(255,255,255,0.12);${rowDisabledStyle}padding:30px 24px;border-radius:22px;margin-bottom:28px; min-height:192px;">
                    <div class="alarm-name-row" style="${contentDisabledStyle}">
                        <span class="alarm-name-main">
                            ${isRenaming
                                ? `<input type="text" class="alarm-name-input" data-alarm-idx="${i}" value="${alarmName.replace(/"/g, '&quot;')}" maxlength="40" style="flex:1; min-width:0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; padding:8px 10px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; ${nameTextDisabledStyle}">`
                                : `<div class="alarm-name-text" style="font-size:11px; text-transform:uppercase; letter-spacing:1.2px; font-weight:900; color:rgba(255,255,255,0.72); ${nameTextDisabledStyle}">${alarmName}</div>`
                            }
                            <button class="alarm-rename-btn" data-alarm-idx="${i}" aria-label="Rename alarm" title="Rename alarm" style="display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border:none; border-radius:8px; background:rgba(255,255,255,0.06); color:#dbe9ff; cursor:pointer;">
                                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="display:block; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
                                </svg>
                            </button>
                        </span>
                        <button class="alarm-type-toggle" data-alarm-idx="${i}" style="color:${typeColor}; opacity:0.95;">${typeLabel}</button>
                    </div>
                    <div class="alarm-time-row" style="${contentDisabledStyle}">
                        <span class="alarm-time-main">
                            <span style="font-size:36px; font-weight:300; letter-spacing:2px;">${a.split(' ')[0]}</span>
                            <span style="font-size:14px; font-weight:900; opacity:0.5;">${a.split(' ')[1]}</span>
                        </span>
                        <span class="alarm-time-right">
                            <button class="alarm-toggle-btn" data-alarm-idx="${i}" aria-label="${isEnabled ? 'Turn alarm off' : 'Turn alarm on'}" style="position:relative; width:56px; height:32px; border:none; border-radius:999px; cursor:pointer; background:${isEnabled ? '#10d176' : '#7a7f88'}; transition:background .2s ease;">
                                <span style="position:absolute; top:3px; left:${isEnabled ? '27px' : '3px'}; width:26px; height:26px; border-radius:50%; background:#fff; transition:left .2s ease;"></span>
                            </button>
                            <button class="alarm-expand-btn" data-alarm-idx="${i}" aria-label="${isExpanded ? 'Collapse alarm options' : 'Expand alarm options'}" aria-expanded="${isExpanded ? 'true' : 'false'}">
                                <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="display:block; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;">
                                    <path d="M6 9l6 6 6-6"></path>
                                </svg>
                            </button>
                        </span>
                    </div>
                    <button type="button" class="alarm-repeat-trigger alarm-repeat-inline-trigger" data-alarm-idx="${i}" aria-label="Edit repeating days for ${a}" style="${contentDisabledStyle}">
                        <span class="alarm-repeat-label">Repeating: ${repeatLabel}</span>
                    </button>
                    <div class="alarm-details ${isExpanded ? 'open' : ''}" style="${contentDisabledStyle}">
                        <div class="alarm-controls-row">
                            <button class="alarm-edit-btn" data-alarm-idx="${i}"><span class="alarm-edit-label">Edit</span></button>
                            <button class="alarm-delete-btn" data-alarm-idx="${i}" aria-label="Delete alarm" title="Delete alarm" style="background:none; border:none; color:var(--accent-red); font-weight:900; font-size:11px; cursor:pointer; text-transform:uppercase; letter-spacing:1.5px;">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M3 6h18"></path>
                                    <path d="M8 6V4h8v2"></path>
                                    <path d="M7 6l1 14h8l1-14"></path>
                                </svg>
                            </button>
                        </div>
                        <button type="button" class="alarm-repeat-trigger alarm-sound-trigger" data-alarm-idx="${i}" aria-label="Choose alarm sound for ${a}">
                            <span class="alarm-repeat-label">Sound: ${soundLabel}</span>
                        </button>
                    </div>
                </div>
            `}).join('');

            document.querySelectorAll('.alarm-edit-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx);
                btn.onclick = (evt) => {
                    evt.preventDefault();
                    evt.stopPropagation();
                    editAlarm(idx);
                };
            });
            document.querySelectorAll('.alarm-repeat-trigger').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx);
                btn.onclick = (evt) => {
                    evt.stopPropagation();
                    if (btn.classList.contains('alarm-sound-trigger')) {
                        openSoundEditor(idx, btn);
                        return;
                    }
                    openRepeatEditor(idx, btn);
                };
            });
            document.querySelectorAll('.alarm-rename-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx, 10);
                btn.onclick = (evt) => {
                    evt.preventDefault();
                    evt.stopPropagation();
                    renameAlarm(idx);
                };
            });
            document.querySelectorAll('.alarm-name-input').forEach(input => {
                const idx = parseInt(input.dataset.alarmIdx, 10);
                setTimeout(() => {
                    if (_renamingAlarmIndex === idx) {
                        input.focus();
                        input.select();
                    }
                }, 0);
                input.addEventListener('keydown', (evt) => {
                    if (evt.key === 'Enter') {
                        evt.preventDefault();
                        _commitAlarmNameEdit(idx, input.value);
                    } else if (evt.key === 'Escape') {
                        evt.preventDefault();
                        _renamingAlarmIndex = null;
                        renderAlarms();
                    }
                });
                input.addEventListener('blur', () => {
                    if (_renamingAlarmIndex === idx) _commitAlarmNameEdit(idx, input.value);
                });
            });
            document.querySelectorAll('.alarm-toggle-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx);
                btn.onclick = () => toggleAlarmEnabled(idx);
            });
            document.querySelectorAll('.alarm-type-toggle').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx, 10);
                btn.onclick = (evt) => {
                    evt.preventDefault();
                    evt.stopPropagation();
                    toggleAlarmType(idx);
                };
            });
            document.querySelectorAll('.alarm-expand-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx, 10);
                btn.onclick = (evt) => {
                    evt.preventDefault();
                    evt.stopPropagation();
                    toggleAlarmDetails(idx);
                };
            });

            document.querySelectorAll('.alarm-delete-btn').forEach(btn => {
                const idx = parseInt(btn.dataset.alarmIdx);
                btn.onclick = () => deleteAlarm(idx);
            });
            _updateAlarmEditActions();

            if (_openRepeatEditorIndex !== null) {
                const activeTrigger = document.querySelector(`.alarm-repeat-inline-trigger[data-alarm-idx="${_openRepeatEditorIndex}"]`);
                if (!activeTrigger) _closeRepeatPopover();
                else if (_repeatPopover) _positionRepeatPopover(activeTrigger, _repeatPopover);
            }
            if (_openSoundEditorIndex !== null) {
                const activeTrigger = document.querySelector(`.alarm-sound-trigger[data-alarm-idx="${_openSoundEditorIndex}"]`);
                if (!activeTrigger) _closeRepeatPopover();
                else if (_repeatPopover) _positionRepeatPopover(activeTrigger, _repeatPopover);
            }
            setAlarmType(selectedAlarmType, { save: false });
            _updateNextAlarmSummary();
            queueNativeAlarmNotificationSync();
        }

        function toggleAlarmDetails(index) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length) return;
            const nextExpanded = _expandedAlarmIndex === index ? null : index;
            if (_openRepeatEditorIndex !== null || _openSoundEditorIndex !== null) _closeRepeatPopover();
            _expandedAlarmIndex = nextExpanded;
            renderAlarms();
        }

        function toggleAlarmEnabled(index) {
            if (!Array.isArray(alarmEnabled) || index < 0 || index >= alarms.length) return;
            alarmEnabled[index] = !alarmEnabled[index];
            renderAlarms();
            saveState();
        }

        function toggleAlarmType(index) {
            if (!Array.isArray(alarmTypes) || index < 0 || index >= alarms.length) return;
            const current = alarmTypes[index] === 'regular' ? 'regular' : 'routine';
            const next = current === 'routine' ? 'regular' : 'routine';
            if (next === 'routine' && !_canSelectRoutineType(index)) {
                showAppTopToast(`Maximum routine alarms reached (${maxRoutineAlarms})`, 2000);
                return;
            }
            alarmTypes[index] = next;
            if (selectedAlarmType === 'routine' && !_canSelectRoutineType(Number.isInteger(editingAlarmIndex) ? editingAlarmIndex : null)) {
                selectedAlarmType = 'regular';
            }
            _updateRoutineLimitControls();
            renderAlarms();
            saveState();
        }

        function renameAlarm(index) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length) return;
            _renamingAlarmIndex = (_renamingAlarmIndex === index) ? null : index;
            renderAlarms();
        }

        function _commitAlarmNameEdit(index, nextName) {
            if (!Number.isInteger(index) || index < 0 || index >= alarms.length) return;
            const current = _normalizeAlarmName(alarmNames[index], index);
            const normalized = _normalizeAlarmName(nextName, index);
            _renamingAlarmIndex = null;
            if (normalized === current) {
                renderAlarms();
                return;
            }
            queueAlarmMutation(() => {
                alarmNames[index] = normalized;
            }, { render: true, save: true, renderReason: 'renameAlarm' });
        }

        function setAlarmType(type, opts = {}) {
            const excludeIndex = Number.isInteger(editingAlarmIndex) ? editingAlarmIndex : null;
            const routineAllowed = _canSelectRoutineType(excludeIndex);
            if (type === 'routine') {
                if (!routineAllowed) type = 'regular';
            }
            selectedAlarmType = type;
            const btnRoutine = document.getElementById('btn-routine');
            const btnRegular = document.getElementById('btn-regular');
            if (btnRoutine && btnRegular) {
                const routineDisabled = !routineAllowed && selectedAlarmType !== 'routine';
                btnRoutine.disabled = routineDisabled;
                btnRoutine.style.pointerEvents = routineDisabled ? 'none' : 'auto';
                btnRoutine.style.cursor = routineDisabled ? 'not-allowed' : 'pointer';
                if (type === 'routine') {
                    btnRoutine.style.background = 'rgba(255,211,78,0.25)';
                    btnRoutine.style.borderColor = 'var(--sun-main)';
                    btnRoutine.style.color = 'var(--sun-main)';
                    btnRegular.style.background = 'rgba(255,255,255,0.06)';
                    btnRegular.style.borderColor = 'rgba(255,255,255,0.2)';
                } else {
                    if (routineDisabled) {
                        btnRoutine.style.background = 'rgba(130,130,130,0.22)';
                        btnRoutine.style.borderColor = 'rgba(130,130,130,0.4)';
                        btnRoutine.style.color = '#b8bec6';
                    } else {
                        btnRoutine.style.background = 'rgba(255,211,78,0.15)';
                        btnRoutine.style.borderColor = 'rgba(255,255,255,0.2)';
                        btnRoutine.style.color = 'var(--sun-main)';
                    }
                    btnRegular.style.background = 'rgba(0,122,255,0.2)';
                    btnRegular.style.borderColor = 'var(--accent-blue)';
                }
            }
            _updateRoutineLimitControls();
            if (opts.save !== false) saveState();
        }

        async function commitAlarmFromPicker() {
            if (_setAlarmLocked) return;
            _setAlarmLocked = true;

            const btn = document.getElementById('set-alarm-btn') || document.getElementById('alarm-commit-btn');
            if (btn) {
                btn.disabled = true;
                btn.style.opacity = '0.6';
                btn.style.pointerEvents = 'none';
            }

            const now = Date.now();
            const activeHourText = document.querySelector('#h-wheel .active')?.innerText;
            const activeMinText = document.querySelector('#m-wheel .active')?.innerText;
            const activePeriodText = creatorPeriodSelection;
            const activeDayText = creatorDaySelection;

            let h = activeHourText || "12";
            let m = activeMinText || "00";
            let p = activePeriodText || "AM";
            let d = activeDayText || EVERY_DAY_LABEL;
            if (!activeHourText || !activeMinText || !activePeriodText) {
                const now = new Date();
                const displayHour = (now.getHours() % 12) || 12;
                h = String(displayHour);
                m = String(now.getMinutes()).padStart(2, '0');
                p = now.getHours() >= 12 ? 'PM' : 'AM';
                d = EVERY_DAY_LABEL;
            }
            
            const newAlarm = `${h}:${m} ${p}`;
            const parsedDay = DAY_LABELS.findIndex(label => label === d);
            const selectedDaysForCreate = (d === EVERY_DAY_LABEL || d === 'Everyday' || parsedDay < 0)
                ? [...ALL_DAY_INDICES]
                : [parsedDay];
            const normalizedDays = _normalizeRepeatDays(selectedDaysForCreate);
            const normalizedType = selectedAlarmType === 'regular' ? 'regular' : 'routine';
            const editing = Number.isInteger(editingAlarmIndex) && editingAlarmIndex >= 0 && editingAlarmIndex < alarms.length;
            const editIdx = editing ? editingAlarmIndex : -1;
            if (normalizedType === 'routine' && !_canSelectRoutineType(editing ? editIdx : null)) {
                _setAlarmLocked = false;
                _syncAlarmCommitButtonLimitState();
                showAppTopToast(`Maximum routine alarms reached (${maxRoutineAlarms})`, 2000);
                return;
            }
            if (!editing && Array.isArray(alarms) && alarms.length >= MAX_ALARMS) {
                _setAlarmLocked = false;
                _syncAlarmCommitButtonLimitState();
                return;
            }

            const payloadKey = `${editing ? `edit:${editIdx}` : 'add'}|${newAlarm}|${normalizedType}|${normalizedDays.join(',')}`;
            if ((now - _lastAlarmCommitAt) < 800 && payloadKey === _lastAlarmCommitPayload) {
                _setAlarmLocked = false;
                _syncAlarmCommitButtonLimitState();
                return;
            }
            _lastAlarmCommitAt = now;
            _lastAlarmCommitPayload = payloadKey;

            try {
                await queueAlarmMutation(() => {
                    if (editing && editIdx >= 0 && editIdx < alarms.length) {
                        alarms[editIdx] = newAlarm;
                        alarmNames[editIdx] = _normalizeAlarmName(alarmNames[editIdx], editIdx);
                        // Keep user's existing repeat selection when editing.
                        alarmsRepeatDays[editIdx] = _normalizeRepeatDays(_getRepeatDaysForAlarm(editIdx));
                        alarmsMeta[editIdx] = _formatRepeatDays(alarmsRepeatDays[editIdx]);
                        alarmTypes[editIdx] = normalizedType;
                        alarmSoundIds[editIdx] = _normalizeAlarmSoundId(alarmSoundIds[editIdx]);
                        alarmEnabled[editIdx] = alarmEnabled[editIdx] !== false;
                    } else {
                        alarms.push(newAlarm);
                        alarmNames.push(_defaultAlarmName(alarms.length - 1));
                        alarmsRepeatDays.push(normalizedDays);
                        alarmsMeta.push(_formatRepeatDays(normalizedDays));
                        alarmTypes.push(normalizedType);
                        alarmSoundIds.push(_normalizeAlarmSoundId(selectedSound));
                        alarmEnabled.push(true);
                    }

                    editingAlarmIndex = null;
                    originalAlarmDraft = null;
                    _closeRepeatPopover();
                    setAlarmComposerOpen(false, { scrollIntoView: false });
                }, { render: true, save: true, renderReason: 'commitAlarmFromPicker' });

                _setAlarmLocked = false;

            }
        }

        function testSound(soundId) {
            _stopAllBeeps();

            const opt = SOUND_OPTIONS.find(s => s.id === soundId);
            if (opt && opt.audioUrl) {
                try {
                    const audio = new Audio(opt.audioUrl);
                    audio.volume = 0.0; // start silent then ramp
                    audio.loop = false;
                    const start = audio.play();
                    if (start && typeof start.catch === 'function') start.catch(() => {});
                    let vol = 0.0;
                    const rampInt = setInterval(() => {
                        vol = Math.min(0.9, vol + 0.05);
                        try { audio.volume = vol; } catch (e) {}
                    }, 120);

                    const stop = () => {
                        try { clearInterval(rampInt); } catch (e) {}
                        const fadeMs = 360;
                        const steps = 9;
                        const volNow = Number.isFinite(audio.volume) ? audio.volume : 0;
                        let step = 0;
                        const fade = setInterval(() => {
                            step += 1;
                            try { audio.volume = Math.max(0, volNow * (1 - (step / steps))); } catch (e) {}
                            if (step >= steps) {
                                clearInterval(fade);
                                try { audio.pause(); audio.currentTime = 0; } catch (e) {}
                            }
                        }, Math.max(20, Math.floor(fadeMs / steps)));
                    };

                    _activeOscillators.push({ audioEl: audio, stop });

                    setTimeout(() => { stop(); }, 6000);
                } catch (e) {
                    console.warn('Failed to play imported audio', e);
                }
            } else {
                const stopBeep = _startBeep(soundId);
                setTimeout(() => {
                    try { stopBeep(); } catch(e){}
                }, 22000);
            }
        }

        function _parseAlarmString(alarmStr) {
            const m = (alarmStr || '').trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/i);
            if (!m) return null;
            let hh = parseInt(m[1], 10);
            const mm = parseInt(m[2], 10);
            const ampm = (m[3] || '').toUpperCase();
            if (ampm === 'AM') {
                if (hh === 12) hh = 0;
            } else if (ampm === 'PM') {
                if (hh !== 12) hh = hh + 12;
            }
            return { hh, mm };
        }

        function _todayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        }

        function _checkAlarms() {
            const now = new Date();
            const nowHH = now.getHours();
            const nowMM = now.getMinutes();
            const todayKey = _todayKey();
            const todayDayIndex = now.getDay(); // 0-6
            Object.keys(_alarmsFiredOn).forEach(key => {
                if (_alarmsFiredOn[key] !== todayKey) delete _alarmsFiredOn[key];
            });

            alarms.forEach((alarmStr, idx) => {
                if (Array.isArray(alarmEnabled) && alarmEnabled[idx] === false) return;
                const parsed = _parseAlarmString(alarmStr);
                if (!parsed) return;
                if (parsed.hh === nowHH && parsed.mm === nowMM) {
                    const allowedDays = _getRepeatDaysForAlarm(idx);
                    if (Array.isArray(allowedDays) && allowedDays.length > 0 && !allowedDays.includes(todayDayIndex)) return;
                    const fireKey = _alarmFireKey(idx);
                    if (_alarmsFiredOn[fireKey] === todayKey) return;

                    _alarmsFiredOn[fireKey] = todayKey;
                    _ringAlarm(idx);
                }
            });
        }

        function _closeAlarmOverlay() {
            _vibrateAlarmStop();
            if (_alarmOverlay) {
                try { document.body.removeChild(_alarmOverlay); } catch (e) {}
                _clearAllAlarmAutoStopTimers();
                _alarmOverlay = null;
                _currentRingingIndexes = [];
            }
            renderAlarms();
        }

        function _snoozeAlarm(index, minutes) {
            const currentAlarmStr = alarms[index];
            if (!currentAlarmStr) return;
            const prevFireKey = _alarmFireKey(index);

            let newTime = new Date();
            newTime.setSeconds(0, 0);
            newTime.setMinutes(newTime.getMinutes() + minutes);
            
            let hh = newTime.getHours();
            const mm = newTime.getMinutes();
            const ampm = hh >= 12 ? 'PM' : 'AM';
            hh = hh % 12;
            if (hh === 0) hh = 12;
            
            const newAlarmStr = `${hh}:${mm.toString().padStart(2, '0')} ${ampm}`;
            alarms[index] = newAlarmStr;
            if (Array.isArray(alarmEnabled) && index >= 0 && index < alarmEnabled.length) {
                alarmEnabled[index] = true;
            }
            const nextFireKey = _alarmFireKey(index);

            _snoozedAsRegularOnce[index] = true;

            if (_alarmsFiredOn) {
                delete _alarmsFiredOn[prevFireKey];
                delete _alarmsFiredOn[nextFireKey];
            }
            
            renderAlarms();
            saveState();

            try {
                _inRoutineSession = false;
                _routineDayModeActive = false;
                switchTab('post');
                _syncSkyMode();
                restoreTabsAfterAlarmAction();
            } catch (e) {
                console.warn('Failed to restore tabs after snooze', e);
            }
            
            const ms = (minutes || 5) * 60 * 1000;
            setTimeout(() => {
                _ringAlarm(index);
            }, ms);
        }

        function _startAlarmChecker() {
            try { _checkAlarms(); } catch (e) { console.warn(e); }
            setInterval(() => {
                try { _checkAlarms(); } catch (e) { console.warn(e); }
            }, 1000); // 1s granularity is sufficient (alarms match minute)
        }

        if (document.readyState === 'complete') {
            _startAlarmChecker();
        } else {
            window.addEventListener('load', _startAlarmChecker);
        }
 
        
        function switchTab(name, opts = {}) {
            if (_inRoutineSession && name === 'post' && !opts.forceRoutineExit) return;
            const mappings = {
                'post': 'screen-post',
                'routine': 'screen-routine',
                'wake': 'screen-wake',
                'timers': 'screen-timers',
                'sounds': 'screen-sounds',
                'settings': 'screen-sounds',
                'background': 'screen-sounds'
            };
            const targetId = mappings[name] || 'screen-post';
            ['screen-wake','screen-post','screen-routine','screen-timers','screen-sounds'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (id === targetId) {
                    el.classList.remove('hidden');
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0) scale(1)';
                } else {
                    el.classList.add('hidden');
                }
            });

            _syncSkyMode();

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (name === 'post') document.getElementById('tab-alarms')?.classList.add('active');
            if (name === 'routine') document.getElementById('tab-routine')?.classList.add('active');
            if (name === 'timers') document.getElementById('tab-timers')?.classList.add('active');
            if (name === 'sounds' || name === 'settings' || name === 'background') document.getElementById('tab-settings')?.classList.add('active');
            if (name === 'routine') renderRoutineEditor();
            requestAnimationFrame(() => requestAnimationFrame(_refreshAllPickerWheels));
        }

        (function initTabs(){
            switchTab('post');
            renderSoundOptions();
            renderBackgroundOptions();
        })();

        
        let _timers = [];
        function _countActiveTimers(excludeTimerId = null) {
            const exclude = excludeTimerId !== null ? String(excludeTimerId) : null;
            return _timers.reduce((count, t) => {
                if (!t || t.active !== true) return count;
                if (exclude !== null && String(t.id) === exclude) return count;
                return count + 1;
            }, 0);
        }

        function _canActivateAnotherTimer(excludeTimerId = null) {
            return _countActiveTimers(excludeTimerId) < MAX_ACTIVE_TIMERS;
        }

        function _syncCreateTimerButtonState() {
            const btn = document.getElementById('create-timer-btn');
            if (!btn) return;
            const atLimit = _countActiveTimers() >= MAX_ACTIVE_TIMERS;
            btn.disabled = atLimit;
            btn.style.pointerEvents = atLimit ? 'none' : 'auto';
            btn.style.opacity = atLimit ? '0.6' : '1';
            btn.style.background = atLimit ? '#7a7f88' : '';
            btn.style.color = atLimit ? '#d9dde3' : '';
            btn.title = atLimit ? `Active timer limit reached (${MAX_ACTIVE_TIMERS})` : '';
        }

        function _formatMs(ms){
            const s = Math.max(0, Math.floor(ms/1000));
            const hh = Math.floor(s/3600);
            const mm = Math.floor((s%3600)/60);
            const ss = (s%60).toString().padStart(2,'0');
            
            if (hh > 0) {
                return hh.toString().padStart(2,'0') + ':' + mm.toString().padStart(2,'0') + ':' + ss;
            } else {
                return mm.toString().padStart(2,'0') + ':' + ss;
            }
        }
        function _renderTimers() {
            const el = document.getElementById('timers-list');
            if (!el) return;
            el.innerHTML = _timers.map(t => {
                const isCloseToRinging = t.remaining < 300000; // within 5 minutes
                const highlightStyle = isCloseToRinging ? 'border:2px solid var(--accent-blue);background:rgba(0,122,255,0.15);box-shadow:0 0 20px rgba(0,122,255,0.3);' : 'border:1px solid rgba(255,255,255,0.03);background:rgba(255,255,255,0.02);';
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:12px;${highlightStyle}" data-timer-row="${t.id}">
                    <div style="display:flex;flex-direction:column;">
                        <div style="font-weight:800">${t.label||'Timer'}</div>
                        <div style="font-size:13px;opacity:0.8" data-timer-display="${t.id}">${_formatMs(t.remaining)}</div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="tab-btn" onclick="toggleTimer('${t.id}')">${t.active ? 'Pause' : 'Start'}</button>
                        <button class="tab-btn" onclick="resetTimer('${t.id}')">Reset</button>
                        <button class="tab-btn timer-delete-btn" data-timer-id="${t.id}">Delete</button>
                    </div>
                </div>`;
            }).join('');
            
            document.querySelectorAll('.timer-delete-btn').forEach(btn => {
                const timerId = btn.dataset.timerId;
                btn.onclick = () => deleteTimer(timerId);
            });
            _syncCreateTimerButtonState();
            _renderPreviousTimers();
        }

        function _updateTimerDisplay(timerId) {
            const timer = _timers.find(t => t.id === timerId);
            if (!timer) return;
            const displayEl = document.querySelector(`[data-timer-display="${timerId}"]`);
            if (displayEl) {
                displayEl.textContent = _formatMs(timer.remaining);
            }
        }

        function _startTimerInterval(timer, opts = {}) {
            const { preserveEndAt = false, persist = true, allowLimitBypass = false } = opts;
            if (!timer) return;
            if (timer.active !== true && !allowLimitBypass && !_canActivateAnotherTimer(timer.id)) {
                _syncCreateTimerButtonState();
                return false;
            }
            clearInterval(timer.interval);
            timer.active = true;
            timer.endAt = preserveEndAt && Number.isFinite(Number(timer.endAt))
                ? Number(timer.endAt)
                : (Date.now() + Math.max(0, Number(timer.remaining) || 0));
            timer.interval = setInterval(() => {
                timer.remaining = Math.max(0, (Number(timer.endAt) || Date.now()) - Date.now());
                if (timer.remaining === 0) {
                    clearInterval(timer.interval);
                    timer.interval = null;
                    timer.active = false;
                    timer.endAt = null;
                    saveState();
                    _timerDone(timer);
                    return;
                }
                // Keep DOM nodes stable while timer runs so control clicks are reliable.
                _updateTimerDisplay(timer.id);
            }, 250);
            if (persist) saveState();
            _syncCreateTimerButtonState();
            return true;
        }

        function _stopTimerInterval(timer, persist = true) {
            if (!timer) return;
            if (timer.active && Number.isFinite(Number(timer.endAt))) {
                timer.remaining = Math.max(0, Number(timer.endAt) - Date.now());
            }
            clearInterval(timer.interval);
            timer.interval = null;
            timer.active = false;
            timer.endAt = null;
            if (persist) saveState();
            _syncCreateTimerButtonState();
        }
        function getWheelValue(wheelId) {
            const wheel = document.getElementById(wheelId);
            if (!wheel) return 0;
            const activeItem = wheel.querySelector('.wheel-item.active') || _getWheelCenteredItem(wheel);
            if (!activeItem) return 0;
            const rawValue = String(activeItem.dataset.wheelValue || activeItem.textContent || '').trim();
            return Number.parseInt(rawValue, 10) || 0;
        }

        function createTimer() {
            const label = document.getElementById('timer-label')?.value.trim();
            const hour = getWheelValue('timer-hour-wheel');
            const min = getWheelValue('timer-min-wheel');
            const sec = getWheelValue('timer-sec-wheel');
            const total = (hour*3600 + min*60 + sec)*1000;
            if (total <= 0) return;
            if (!_canActivateAnotherTimer()) {
                _syncCreateTimerButtonState();
                return;
            }
            const id = String(Date.now()) + Math.random().toString(36).slice(2,6);
            const timer = { id, label, total, setDurationMs: total, skipHistoryOnFinish: false, remaining: total, interval: null, active: false, endAt: null };
            _timers.unshift(timer);
            
            _startTimerInterval(timer);
            
            _renderTimers();
            _resetTimerPickerToZero();
            
            const labelInput = document.getElementById('timer-label');
            if (labelInput) labelInput.value = '';
        }
        function toggleTimer(id) {
            const t = _timers.find(x=>x.id===id); if(!t) return;
            if (t.active) {
                _stopTimerInterval(t);
            } else {
                if (!_startTimerInterval(t)) return;
            }
            _renderTimers();
        }
        function resetTimer(id) {
            const t=_timers.find(x=>x.id===id);
            if(!t) return;
            _stopTimerInterval(t, false);
            t.remaining = t.total;
            t.endAt = null;
            _renderTimers();
            saveState();
        }
        function deleteTimer(id) {
            const idx=_timers.findIndex(x=>x.id===id);
            if(idx>=0){
                _stopTimerInterval(_timers[idx], false);
                _timers.splice(idx,1);
                _removeTimerFromHistory(id);
                _renderTimers();
                saveState();
            }
        }

                if (!t.skipHistoryOnFinish) _recordPreviousTimer(t);
                const doneIdx = _timers.findIndex(tm => tm && tm.id === t.id);
                if (doneIdx >= 0) _timers.splice(doneIdx, 1);
                _renderTimers();
                saveState();
                const stop = _startBeep();
                _currentRingingTimerId = t.id;
                _currentTimerStopFn = stop;

                if (!_timerOverlay) {

                    const card = document.createElement('div');

                    const stopBtn = document.createElement('button');

                    stopBtn.onclick = () => {
                        try { if (typeof _currentTimerStopFn === 'function') _currentTimerStopFn(); } catch (e) {}

                const timerLabel = String((_currentRingingTimerSnapshot && _currentRingingTimerSnapshot.label) || t.label || '').trim();
                if (ttl) ttl.textContent = timerLabel ? `Timer — ${timerLabel}` : 'Timer Finished';
                if (metaEl) metaEl.textContent = `Duration: ${_formatMs(Math.max(0, Number(t.setDurationMs) || Number(t.total) || 0))}`;

                try { switchTab('timers'); } catch (e) {}

            } catch (e) {
                console.warn('Timer done beep failed', e);
            }
        }

        function _closeTimerOverlay() {
            if (_timerOverlay) {
                try { document.body.removeChild(_timerOverlay); } catch (e) {}
                _timerOverlay = null;
                _currentRingingTimerId = null;
                _currentTimerStopFn = null;
                _currentRingingTimerSnapshot = null;
            }
        }

        document.addEventListener('animationend', (event) => {
            if (!(event.target instanceof Element) || !event.target.classList.contains('btn-bounce-click')) return;
            event.target.classList.remove('btn-bounce-click');
        });

        document.getElementById('create-timer-btn')?.addEventListener('click', createTimer);
        
        let _sw_running = false, _sw_start=0, _sw_elapsed=0, _sw_tick=null;
        function _sw_fmt(n){
            const cent = Math.floor((n%1000)/10).toString().padStart(2,'0');
            const s = Math.floor(n/1000);
            const mm = Math.floor(s/60).toString().padStart(2,'0');
            const ss = (s%60).toString().padStart(2,'0');
            return `${mm}:${ss}.${cent}`;
        }
        function _sw_render(){
            const disp = document.getElementById('sw-display'); if(!disp) return;
            const now = _sw_elapsed + (_sw_running ? (Date.now()-_sw_start) : 0);
            disp.textContent = _sw_fmt(now);
        }
        function _sw_startstop(){
            if (_sw_running) {
                _sw_elapsed += Date.now()-_sw_start;
                _sw_running = false; clearInterval(_sw_tick); _sw_tick=null;
                document.getElementById('sw-start').textContent = 'Start';
            } else {
                _sw_start = Date.now(); _sw_running = true;
                _sw_tick = setInterval(_sw_render, 60);
                document.getElementById('sw-start').textContent = 'Stop';
            }
            _sw_render();
            saveState();
        }
        function _sw_reset(){ _sw_running=false; clearInterval(_sw_tick); _sw_tick=null; _sw_elapsed=0; _sw_start=0; document.getElementById('sw-start').textContent='Start'; _sw_render(); saveState(); }
        document.getElementById('sw-start')?.addEventListener('click', _sw_startstop);
        document.getElementById('sw-reset')?.addEventListener('click', _sw_reset);
    </script>
