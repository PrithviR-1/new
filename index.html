<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routinely</title>
    <style>
        

        :root {
            
            --sky-night: linear-gradient(180deg, #000000 0%, #010102 55%, #020204 100%);
            --sky-day: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            
            
            --sun-main: #FFD34E;
            --sun-stroke: #E8A838;
            --sun-light: #FFF1AD;
            --sun-glow: rgba(255, 211, 78, 0.5);
            
            
            --cloud-white: #ffffff;
            --cloud-light: #eef4f9;
            --cloud-mid: #b2d4ef;
            --cloud-shadow: #89b9e0;
            
            
            --accent-blue: #007aff;
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --accent-gold: #ffd700;
            --action-grad-start: #95c0ea;
            --action-grad-end: #c4e7c7;
            --action-border: #7f9bb5;
            --action-text: #6f7c8a;
            
            
            --glass-bg: #000000;
            --glass-stroke: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --card-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7);

            
            --transition-speed: 5s;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --app-shell-width: min(100vw, 584px);
        }

        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body { 
            height: 100vh; 
            min-height: 100dvh;
            max-height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            background: #000; 
            color: var(--text-primary); 
            display: flex;
            justify-content: center;
            position: fixed;
            inset: 0;
            overscroll-behavior: none;
        }

        
        #stage {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            width: var(--app-shell-width);
            transform: translateX(-50%);
            overflow: hidden;
            background: var(--sky-night);
            transition: background var(--transition-speed) var(--ease-out-expo);
            z-index: 1;
            isolation: isolate;
        }

        
        .sun-system {
            position: absolute;
            top: 11%;
            left: 50%;
            width: 116px;
            height: 116px;
            transform: translate(-50%, 100vh);
            transition: transform 6s cubic-bezier(0.23, 1, 0.32, 1), z-index 0.1s;
            z-index: 2;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun-on-top { z-index: 2 !important; }

        
        .moon-system {
            position: absolute;
            top: 12.6%;
            left: 50%;
            width: 116px;
            height: 116px;
            transform: translate(-50%, -140vh);
            transition: transform 5.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 1.1s ease;
            z-index: 3;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: moon-float-y 6s ease-in-out infinite;
        }

        #body:not(.day-active) .moon-system {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .moon-aura {
            position: absolute;
            width: 165px;
            height: 165px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(222, 236, 255, 0.45) 0%, rgba(195, 216, 247, 0.2) 50%, rgba(120, 160, 226, 0.02) 100%);
            filter: blur(20px);
            animation: moon-glow 5.4s ease-in-out infinite alternate;
        }

        .moon-body {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f3f8ff 0%, #dce9fb 52%, #c4d6ef 100%);
            box-shadow: 0 0 18px rgba(215, 232, 255, 0.45), inset -10px -10px 16px rgba(110, 132, 167, 0.16);
            overflow: hidden;
        }

        .moon-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(32, 49, 78, 0.62);
            transition: transform 0.9s ease;
        }

        .moon-crater {
            position: absolute;
            border-radius: 50%;
            background: rgba(154, 179, 214, 0.22);
            box-shadow: inset -1px -1px 2px rgba(104, 129, 168, 0.25);
        }

        .moon-crater.a { width: 10px; height: 10px; top: 22px; left: 16px; }
        .moon-crater.b { width: 8px; height: 8px; top: 38px; left: 30px; }
        .moon-crater.c { width: 6px; height: 6px; top: 20px; left: 44px; }

        
        .moon-system.phase-full .moon-shadow { opacity: 0; transform: translateX(0); }
        .moon-system.phase-half .moon-shadow { opacity: 1; transform: translateX(-36px); }
        .moon-system.phase-crescent-right .moon-shadow { opacity: 1; transform: translateX(-51px); }
        .moon-system.phase-crescent-left .moon-shadow { opacity: 1; transform: translateX(51px); }
        .moon-system.phase-threeq-right .moon-shadow { opacity: 1; transform: translateX(-22px); }
        .moon-system.phase-threeq-left .moon-shadow { opacity: 1; transform: translateX(22px); }

        .sun-spin {
            width: 126px;
            height: 126px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 3;
        }

        .sun-glow {
            position: absolute;
            width: 178px;
            height: 178px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 218, 120, 0.58) 0%, rgba(255, 196, 84, 0.34) 40%, rgba(255, 166, 52, 0.1) 68%, rgba(255, 166, 52, 0) 100%);
            filter: blur(10px);
            opacity: 0.9;
            animation: sun-pulse 5s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        .sun-lightcast {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 222, 145, 0.24) 0%, rgba(255, 206, 110, 0.14) 35%, rgba(255, 186, 88, 0.05) 58%, rgba(255, 186, 88, 0) 100%);
            filter: blur(20px);
            opacity: 0.72;
            animation: sun-pulse 6.4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        .sun-icon {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .sun-icon .sun-rotor {
            opacity: 0.96;
            transform-origin: 100px 100px;
            transform-box: view-box;
            animation: rotate-sun 30s linear infinite;
            will-change: transform;
        }

        .sun-icon .sun-core {
            filter: drop-shadow(0 0 11px rgba(255, 205, 98, 0.4)) drop-shadow(0 0 24px rgba(255, 205, 98, 0.22));
        }

        
        .starfield,
        .shooting-starfield {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
            opacity: 1;
            transition: opacity 1.2s ease;
        }

        .day-active .starfield,
        .day-active .shooting-starfield {
            opacity: 0;
        }

        .birds-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .day-active .birds-layer {
            opacity: 0.62;
        }

        #body:not(.day-active) .birds-layer {
            opacity: 0;
        }

        .bird {
            position: absolute;
            left: -16vw;
            top: var(--y, 26%);
            width: 22px;
            height: 14px;
            color: var(--bird-color, rgba(0, 0, 0, 0.82));
            filter: none;
            transform: translate3d(var(--sx, -16vw), 0, 0) rotate(var(--tilt, 0deg)) scale(var(--scale, 0.8)) scaleX(var(--flip, 1));
            animation: bird-fly var(--dur, 32s) linear 1;
            animation-delay: var(--delay, 0s);
            will-change: transform, opacity;
        }

        .bird-svg {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
            animation: bird-bob var(--bobdur, 2.6s) ease-in-out infinite;
            will-change: transform;
        }

        .bird .body {
            fill: currentColor;
            opacity: 0.92;
        }

        .bird .wing {
            fill: currentColor;
            transform-box: fill-box;
            transform-origin: 82% 78%;
            animation: bird-flap-seq var(--flapcycle, 5.8s) cubic-bezier(0.42, 0, 0.2, 1) infinite;
            animation-delay: var(--flapdelay, 0s);
            will-change: transform;
        }

        .bird .wing.right {
            transform-origin: 18% 78%;
            animation-name: bird-flap-seq-right;
        }

        .bird .tail {
            fill: currentColor;
            opacity: 0.86;
        }

        
        .wind-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.38;
            transition: opacity 1.2s ease;
        }

        .wind-streak {
            position: absolute;
            left: 0;
            top: var(--wind-top, 40%);
            width: var(--wind-length, 130px);
            height: var(--wind-thickness, 3px);
            border-radius: 999px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.5) 20%,
                rgba(255,255,255,0.82) 48%,
                rgba(255,255,255,0.45) 76%,
                rgba(255,255,255,0) 100%);
            filter: blur(0.2px);
            opacity: 0;
            animation-duration: var(--wind-duration, 7.2s);
            animation-delay: var(--wind-delay, 0s);
            animation-timing-function: cubic-bezier(0.2, 0.7, 0.35, 1);
            animation-iteration-count: infinite;
            will-change: transform, opacity;
        }

        .wind-streak::after {
            content: "";
            position: absolute;
            right: -14px;
            top: -5px;
            width: 20px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.58);
            border-left: none;
            border-bottom: none;
            border-radius: 0 100% 0 0;
            opacity: 0.85;
            transform: rotate(16deg);
        }

        #body.wind-right .wind-streak {
            animation-name: wind-sweep-right;
        }

        #body.wind-left .wind-streak {
            animation-name: wind-sweep-left;
        }

        .day-active .wind-streak {
            animation-play-state: running;
        }

        #body:not(.day-active) .wind-layer {
            opacity: 0;
        }

        #body:not(.day-active) .wind-streak {
            animation-play-state: paused;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 6px rgba(255,255,255,0.4);
            animation: twinkle var(--twinkle-duration, 4s) ease-in-out infinite alternate,
                       star-drift var(--drift-duration, 30s) ease-in-out infinite alternate;
            animation-delay: var(--twinkle-delay, 0s), var(--drift-delay, 0s);
            will-change: transform, opacity;
        }

        .star.large {
            width: 3.4px;
            height: 3.4px;
            box-shadow: 0 0 10px rgba(255,255,255,0.65);
        }

        .star.diamond {
            width: 8px;
            height: 8px;
            border-radius: 1px;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 0 14px rgba(255,255,255,0.85);
        }

        .shooting-star {
            position: absolute;
            width: var(--trail-length, 130px);
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.95));
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
            transform: translate3d(var(--sx, -120px), var(--sy, -120px), 0) rotate(var(--shoot-angle, -26deg));
            opacity: 0;
            animation: shooting-star var(--shoot-duration, 10s) linear infinite;
            animation-delay: var(--shoot-delay, 0s);
            will-change: transform, opacity;
        }

        
        .cloud-container {
            position: absolute;
            inset: 0;
            z-index: 4;
            perspective: 1200px;
            opacity: 1;
            transform: translate3d(0, 0, 0);
            transition: opacity 1.2s ease, transform 1.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .cloud {
            position: absolute;
            
            filter: none;
            will-change: transform, opacity;
            pointer-events: none;
            transform-origin: center;
        }

        .cloud-group {
            position: relative;
            filter: none;
            transition: transform 420ms cubic-bezier(.2,.9,.3,1);
        }

        .puff-base {
            position: absolute;
            background: #f4f9ff;
            border-radius: 120px;
            z-index: 1;
            filter: none;
            box-shadow: none;
        }
        .puff-body {
            position: absolute;
            background: #f4f9ff;
            border-radius: 120px;
            z-index: 2;
            top: -8px; left: 6px;
            box-shadow: none;
            filter: none;
        }
        .puff-highlight {
            display: none;
        }

        
        .c1 { top: 8%; left: 4%; transform: scale(0.64); }
        .c2 { top: 36%; right: -2%; transform: scale(0.98); }
        .c3 { bottom: 16%; left: 12%; transform: scale(1.18); }
        .c4 { top: 6%; right: 18%; transform: scale(0.52); }
        .c5 { bottom: 34%; left: -6%; transform: scale(0.78); opacity: 0.72; }

        
        #app-ui {
            position: relative;
            height: 100vh;
            min-height: 100dvh;
            max-height: 100dvh;
            width: var(--app-shell-width);
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 calc(140px + env(safe-area-inset-bottom));
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 100; 
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        #app-ui::-webkit-scrollbar { display: none; }

        .app-top-toast {
            position: fixed;
            top: calc(62px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%) translateY(-12px);
            z-index: 1200;
            background: rgba(12, 20, 32, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            color: #f5f8ff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            white-space: nowrap;
            box-shadow: 0 10px 24px rgba(0,0,0,0.36);
        }
        .app-top-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-stroke);
            border-radius: 44px;
            width: 100%;
            max-width: var(--app-shell-width);
            padding: 44px;
            box-shadow: var(--card-shadow);
            opacity: 1;
            transform: translateY(0);
            transition: all 1.2s var(--ease-out-expo);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            margin-bottom: 40px;
        }

        .glass-card.hidden {
            opacity: 0;
            transform: translateY(120px) scale(0.92);
            pointer-events: none;
            display: none;
        }

        #body.no-background-mode #stage {
            opacity: 0;
            pointer-events: none;
        }

        #body.no-background-mode #app-ui {
            align-items: center;
            padding: 0 0 calc(140px + env(safe-area-inset-bottom));
            background: #000000;
        }

        #body.no-background-mode .glass-card {
            max-width: var(--app-shell-width) !important;
            width: 100%;
            border-radius: 0;
            margin-bottom: 40px;
        }
        #body.clear-background-mode #app-ui {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.16) 0%, rgba(0, 0, 0, 0.28) 100%);
        }
        #body.clear-background-mode .glass-card {
            background: rgba(5, 12, 22, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 24px 56px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
        }
        #body.clear-background-mode .bottom-nav .nav-inner {
            background: rgba(5, 12, 22, 0.56);
            border-color: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
        }
        #body.clear-background-mode #next-alarm-summary {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        #body.clear-background-mode #alarms-screen-layout {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        #body.clear-background-mode #alarm-create-panel {
            background: transparent !important;
            border-bottom-color: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
        }
        #body.clear-background-mode #alarms-screen-layout #alarm-list {
            background: transparent !important;
        }
        #body.clear-background-mode #alarm-create-panel .picker-container,
        #body.clear-background-mode .picker-container {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        #body.clear-background-mode #screen-post .wheel {
            background: transparent !important;
        }
        #body.clear-background-mode .picker-container::before {
            background: rgba(5, 12, 22, 0.5);
            border-top-color: rgba(255, 255, 255, 0.18);
            border-bottom-color: rgba(255, 255, 255, 0.18);
        }
        #body.clear-background-mode #alarm-create-panel .routine-limit-btn {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            color: #eaf4ff !important;
        }
        #body.clear-background-mode #alarm-create-panel .routine-limit-btn.active {
            background: rgba(255, 211, 78, 0.36) !important;
            border-color: rgba(255, 211, 78, 0.72) !important;
            color: #fff7d1 !important;
        }
        #body.clear-background-mode #alarm-create-panel .alarm-type-btn {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        #body.clear-background-mode input[type="text"],
        #body.clear-background-mode #timer-label,
        #body.clear-background-mode .alarm-name-input {
            background: rgba(5, 12, 22, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        h2 { 
            font-size: 42px; 
            font-weight: 900; 
            margin-bottom: 28px; 
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
        }

        
        #cam-container {
            width: 100%;
            height: 260px;
            background: #000;
            border-radius: 34px;
            overflow: hidden;
            margin-bottom: 34px;
            border: 2px solid rgba(255,255,255,0.08);
            position: relative;
            transform: translateZ(0);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }

        
        .progress-box { margin-bottom: 45px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-weight: 900;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-rail {
            width: 100%;
            height: 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, var(--action-grad-start) 0%, var(--action-grad-end) 100%);
            border-radius: 20px;
            transition: width 1.2s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 18px rgba(149, 192, 234, 0.45);
        }

        
        .item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            padding: 26px;
            border-radius: 32px;
            margin-bottom: 18px;
            cursor: pointer;
            transition: all 0.5s var(--ease-out-expo);
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        .item:hover { 
            background: rgba(255,255,255,0.09); 
            transform: scale(1.03) translateX(5px); 
            border-color: rgba(255,255,255,0.15);
        }
        .item.checked { 
            background: rgba(48, 209, 88, 0.15); 
            border-color: rgba(48, 209, 88, 0.3);
        }
        .item.completing {
            pointer-events: none;
            animation: routine-item-fade-out 560ms ease forwards;
        }
        .item.completing::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(48, 209, 88, 0.95), rgba(101, 230, 136, 0.95));
            transform: translateY(-50%) scaleX(0);
            transform-origin: left center;
            animation: routine-item-strike 560ms cubic-bezier(0.22, 0.8, 0.3, 1) forwards;
            box-shadow: 0 0 10px rgba(48, 209, 88, 0.45);
            pointer-events: none;
        }
        .item span { font-size: 18px; font-weight: 700; color: #fff; }

        .check-circle {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            margin-right: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
            font-size: 14px;
            font-weight: 900;
        }
        .checked .check-circle {
            background: var(--accent-green);
            border-color: var(--accent-green);
            transform: scale(1.2) rotate(360deg);

            try { return JSON.parse(raw); } catch (e) { return null; }
        }

        function _normalizeTaskList(list) {
            if (!Array.isArray(list)) return createDefaultTasks();
            const seen = new Set();
            const normalized = list
                .filter(t => t && typeof t.text === 'string')
                .map(t => ({
                    id: t.id,
                    text: t.text.trim(),
                    done: !!t.done
                }))
                .map(t => {
                    let id = (typeof t.id === 'string' && t.id.trim())
                        ? t.id.trim()
                        : (Number.isFinite(Number(t.id)) ? String(Number(t.id)) : _createTaskId());
                    if (seen.has(id)) id = _createTaskId();
                    seen.add(id);
                    return { ...t, id };
                })
                .filter(t => t.text.length > 0);
            return normalized.length ? normalized : createDefaultTasks();
        }

        function _legacyMetaToRepeatDays(meta) {
            if (!meta || String(meta).toLowerCase().includes('every')) return [...ALL_DAY_INDICES];
            if (String(meta).toLowerCase() === 'weekdays') return [1, 2, 3, 4, 5];
            if (String(meta).toLowerCase() === 'weekends') return [0, 6];
            const parts = String(meta).split(',').map(s => s.trim()).filter(Boolean);
            const indices = [];
            parts.forEach(p => {
                const idx = DAY_LABELS.findIndex(x => x.toLowerCase() === p.toLowerCase());
                if (idx >= 0 && !indices.includes(idx)) indices.push(idx);
            });
            return indices.length ? indices.sort((a, b) => a - b) : [...ALL_DAY_INDICES];
        }

        function _normalizeRepeatDays(days) {
            if (!Array.isArray(days)) return [...ALL_DAY_INDICES];
            const seen = new Set();
            const normalized = [];
            days.forEach(v => {
                const d = Number(v);
                if (!Number.isInteger(d) || d < 0 || d > 6 || seen.has(d)) return;
                seen.add(d);
                normalized.push(d);
            });
            normalized.sort((a, b) => a - b);
            return normalized;
        }

        function _defaultAlarmName(index) {
            return 'Alarm';
        }

        function _normalizeAlarmName(name, index) {
            const out = String(name || '').trim();
            return out || _defaultAlarmName(index);
        }

        function _formatRepeatDays(days) {
            const normalized = _normalizeRepeatDays(days);
            if (normalized.length === 0) return 'Never';
            if (normalized.length === 7) return 'Every day';
            if (normalized.join(',') === '1,2,3,4,5') return 'Weekdays';
            if (normalized.join(',') === '0,6') return 'Weekends';
            return normalized.map(d => DAY_LABELS[d]).join(', ');
        }

        function _normalizeAlarmSoundId(soundId) {
            const normalized = String(soundId || '').trim();
            if (!normalized) return DEFAULT_SOUND_ID;
            const exists = Array.isArray(SOUND_OPTIONS) && SOUND_OPTIONS.some(s => s && s.id === normalized);
            return exists ? normalized : DEFAULT_SOUND_ID;
        }

        function _getAlarmSoundId(index) {
            if (!Array.isArray(alarmSoundIds) || index < 0 || index >= alarmSoundIds.length) return DEFAULT_SOUND_ID;
            return _normalizeAlarmSoundId(alarmSoundIds[index]);
        }

        function _getSoundNameById(soundId) {
            const normalized = _normalizeAlarmSoundId(soundId);
            const match = Array.isArray(SOUND_OPTIONS) ? SOUND_OPTIONS.find(s => s && s.id === normalized) : null;
            return match ? String(match.name || 'Default') : 'Default';
        }

        function _syncAlarmCommitButtonLimitState() {
            const btn = document.getElementById('set-alarm-btn') || document.getElementById('alarm-commit-btn');
            if (!btn) return;

        function _normalizeAlarmCollections() {
            if (!Array.isArray(alarms)) alarms = [];
            if (!Array.isArray(alarmNames)) alarmNames = [];
            if (!Array.isArray(alarmsRepeatDays)) alarmsRepeatDays = [];
            if (!Array.isArray(alarmsMeta)) alarmsMeta = [];
            if (!Array.isArray(alarmTypes)) alarmTypes = [];
            if (!Array.isArray(alarmSoundIds)) alarmSoundIds = [];
            if (!Array.isArray(alarmEnabled)) alarmEnabled = [];

            const len = alarms.length;
            alarms = alarms.map(a => String(a || '').trim()).filter(Boolean);
            const targetLen = alarms.length;

            alarmNames = alarms.map((_, i) => _normalizeAlarmName(alarmNames[i], i));
            alarmsRepeatDays = alarms.map((_, i) => _normalizeRepeatDays(alarmsRepeatDays[i]));
            alarmsMeta = alarms.map((_, i) => _formatRepeatDays(alarmsRepeatDays[i]));
            let routineCount = 0;
            alarmTypes = alarms.map((_, i) => {
                const normalized = alarmTypes[i] === 'regular' ? 'regular' : 'routine';
                if (normalized === 'routine') {
                    routineCount += 1;
                    if (routineCount > maxRoutineAlarms) return 'regular';
                }
                return normalized;
            });
            alarmSoundIds = alarms.map((_, i) => _normalizeAlarmSoundId(alarmSoundIds[i]));
            alarmEnabled = alarms.map((_, i) => alarmEnabled[i] !== false);

            if (targetLen !== len && Number.isInteger(editingAlarmIndex) && editingAlarmIndex >= targetLen) {
                editingAlarmIndex = null;
                originalAlarmDraft = null;
            }

            _sortAlarmsChronologically();
        }

        function _alarmMinutesOfDay(alarmStr) {
            const parsed = _parseAlarmString(alarmStr);
            if (!parsed) return Number.MAX_SAFE_INTEGER;
            return (parsed.hh * 60) + parsed.mm;
        }

        function _sortAlarmsChronologically() {
            if (!Array.isArray(alarms) || alarms.length <= 1) return;
            const combined = alarms.map((alarmStr, i) => ({
                alarmStr: String(alarmStr || ''),
                name: _normalizeAlarmName(alarmNames[i], i),
                repeatDays: _normalizeRepeatDays(alarmsRepeatDays[i]),
                meta: String(alarmsMeta[i] || ''),
                type: alarmTypes[i] === 'regular' ? 'regular' : 'routine',
                soundId: _normalizeAlarmSoundId(alarmSoundIds[i]),
                enabled: alarmEnabled[i] !== false,
                originalIndex: i
            }));

            combined.sort((a, b) => {
                const diff = _alarmMinutesOfDay(a.alarmStr) - _alarmMinutesOfDay(b.alarmStr);
                if (diff !== 0) return diff;
                return a.originalIndex - b.originalIndex;
            });

            alarms = combined.map(x => x.alarmStr);
            alarmNames = combined.map((x, i) => _normalizeAlarmName(x.name, i));
            alarmsRepeatDays = combined.map(x => x.repeatDays);
            alarmsMeta = combined.map(x => _formatRepeatDays(x.repeatDays));
            alarmTypes = combined.map(x => x.type);
            alarmSoundIds = combined.map(x => x.soundId);
            alarmEnabled = combined.map(x => x.enabled);
        }

        function _normalizeTimerHistoryEntry(entry) {
            if (!entry || typeof entry !== 'object') return null;
            const label = String(entry.label || '').trim() || 'Timer';
            const setDurationMs = Math.max(0, Number(entry.setDurationMs) || 0);
            const completedAt = Math.max(0, Number(entry.completedAt) || Date.now());
            if (!setDurationMs) return null;
            return {
                timerId: String(entry.timerId || ''),
                label,
                setDurationMs,
                completedAt
            };
        }

        function _recordPreviousTimer(timer) {
            if (!timer || typeof timer !== 'object') return;
            const normalized = _normalizeTimerHistoryEntry({
                timerId: timer.id,
                label: timer.label || 'Timer',
                setDurationMs: Math.max(0, Number(timer.setDurationMs) || Number(timer.total) || 0),
                completedAt: Date.now()
            });
            if (!normalized) return;
            previousTimerHistory.unshift(normalized);
            previousTimerHistory = previousTimerHistory
                .map(_normalizeTimerHistoryEntry)
                .filter(Boolean)
                .slice(0, MAX_TIMER_HISTORY);
            _renderPreviousTimers();
            saveState();
        }

        function _removeTimerFromHistory(timerId) {
            const target = String(timerId || '');
            if (!target) return;
            previousTimerHistory = (Array.isArray(previousTimerHistory) ? previousTimerHistory : [])
                .filter(entry => String((entry && entry.timerId) || '') !== target);
        }

        function _removePreviousTimerEntry(timerId, completedAt) {
            const targetId = String(timerId || '');
            const targetCompletedAt = Number(completedAt) || 0;
            previousTimerHistory = (Array.isArray(previousTimerHistory) ? previousTimerHistory : [])
                .filter(entry => {
                    if (!entry) return false;
                    return !(String(entry.timerId || '') === targetId && Number(entry.completedAt || 0) === targetCompletedAt);
                });
            _renderPreviousTimers();
            saveState();
        }

        function _setTimerFromHistory(timerId, completedAt) {
            const targetId = String(timerId || '');
            const targetCompletedAt = Number(completedAt) || 0;
            const entry = (Array.isArray(previousTimerHistory) ? previousTimerHistory : [])
                .find(item => item && String(item.timerId || '') === targetId && Number(item.completedAt || 0) === targetCompletedAt);
            const normalized = _normalizeTimerHistoryEntry(entry);
            if (!normalized) return;
            if (!_canActivateAnotherTimer()) {
                _syncCreateTimerButtonState();
                return;
            }
            const duration = Math.max(1000, Number(normalized.setDurationMs) || 0);
            const newId = String(Date.now()) + Math.random().toString(36).slice(2, 6);
            const timer = {
                id: newId,
                label: String(normalized.label || 'Timer'),
                total: duration,
                setDurationMs: duration,
                skipHistoryOnFinish: true,
                remaining: duration,
                interval: null,
                active: false,
                endAt: null
            };
            _timers.unshift(timer);
            if (!_startTimerInterval(timer)) {
                _timers = _timers.filter(tm => tm.id !== newId);
                _renderTimers();
                saveState();
                return;
            }
            _renderTimers();
            saveState();
        }

        function _renderPreviousTimers() {
            const list = document.getElementById('previous-timers-list');
            if (!list) return;
            const items = (Array.isArray(previousTimerHistory) ? previousTimerHistory : [])
                .map(_normalizeTimerHistoryEntry)

                .slice(0, MAX_TIMER_HISTORY);

            if (!items.length) {
                list.innerHTML = `<div style="padding:10px; border-radius:10px; background:rgba(255,255,255,0.03); color:var(--text-secondary); font-size:12px; font-weight:700;">No previous timers yet</div>`;
                return;
            }

            list.innerHTML = items.map(entry => {
                return `<div style="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);">
                    <div style="min-width:0; flex:1;">
                        <div style="font-size:13px; font-weight:800; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${entry.label}</div>
                        <div style="display:flex; gap:6px; margin-top:8px;">
                            <button type="button" class="previous-timer-set-btn" data-timer-id="${entry.timerId}" data-completed-at="${entry.completedAt}" style="border:none; border-radius:8px; padding:6px 8px; font-size:10px; font-weight:900; letter-spacing:0.6px; text-transform:uppercase; background:rgba(10,132,255,0.22); color:#dbe9ff; cursor:pointer;">Set this timer</button>
                            <button type="button" class="previous-timer-delete-btn" data-timer-id="${entry.timerId}" data-completed-at="${entry.completedAt}" style="border:none; border-radius:8px; padding:6px 8px; font-size:10px; font-weight:900; letter-spacing:0.6px; text-transform:uppercase; background:rgba(255,69,58,0.18); color:#ffd8d4; cursor:pointer;">Delete</button>
                        </div>
                    </div>
                    <div style="font-size:12px; font-weight:900; color:#fff; white-space:nowrap;">${_formatMs(entry.setDurationMs)}</div>
                </div>`;
            }).join('');

            list.querySelectorAll('.previous-timer-set-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    _setTimerFromHistory(btn.dataset.timerId, btn.dataset.completedAt);
                });
            });
            list.querySelectorAll('.previous-timer-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    _removePreviousTimerEntry(btn.dataset.timerId, btn.dataset.completedAt);
                });
            });
        }

        function _formatNextAlarmRemaining(ms) {
            const total = Math.max(0, Math.floor(ms / 1000));
            const days = Math.floor(total / 86400);
            const hours = Math.floor((total % 86400) / 3600);
            const minutes = Math.floor((total % 3600) / 60);
            const seconds = total % 60;
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function _updateNextAlarmSummary() {
            const textEl = document.getElementById('next-alarm-remaining');
            const fillEl = document.getElementById('next-alarm-fill');
            if (!textEl || !fillEl) return;

            if (!Array.isArray(alarms) || alarms.length === 0) {
                textEl.textContent = 'No active alarms';
                fillEl.style.width = '0%';
                return;
            }

            let minMs = Number.POSITIVE_INFINITY;
            let minIdx = -1;
            for (let i = 0; i < alarms.length; i += 1) {
                if (Array.isArray(alarmEnabled) && alarmEnabled[i] === false) continue;
                const ms = _timeUntilAlarm(alarms[i], i);
                if (Number.isFinite(ms) && ms < minMs) {
                    minMs = ms;
                    minIdx = i;
                }
            }

            if (minIdx < 0 || !Number.isFinite(minMs)) {
                textEl.textContent = 'No active alarms';
                fillEl.style.width = '0%';
                return;
            }

            const rangeMs = 24 * 60 * 60 * 1000;
            const pct = Math.max(0, Math.min(100, ((rangeMs - Math.min(minMs, rangeMs)) / rangeMs) * 100));
            fillEl.style.width = `${pct}%`;
            textEl.textContent = `${_formatNextAlarmRemaining(minMs)} until ${alarms[minIdx]}`;
        }

        function _getLocalNotificationsPlugin() {
            try {
                if (!window.Capacitor || typeof window.Capacitor.isNativePlatform !== 'function') return null;
                if (!window.Capacitor.isNativePlatform()) return null;
                const plugin = window.Capacitor?.Plugins?.LocalNotifications || null;
                return plugin;
            } catch (e) {
                return null;
            }
        }

        async function _ensureNativeNotificationPermission() {
            const plugin = _getLocalNotificationsPlugin();
            if (!plugin) return false;
            try {
                const current = typeof plugin.checkPermissions === 'function'
                    ? await plugin.checkPermissions()
                    : null;
                if (current?.display === 'granted') return true;

                if (!_nativeNotificationsPermissionRequested || current?.display !== 'granted') {
                    _nativeNotificationsPermissionRequested = true;
                    const requested = await plugin.requestPermissions();
                    return requested?.display === 'granted';
                }

                return false;
            } catch (e) {
                console.warn('LocalNotifications permission request failed', e);
                return false;
            }
        }

        function _buildNextNativeAlarmNotifications() {
            const notifications = [];
            for (let i = 0; i < alarms.length; i += 1) {
                if (Array.isArray(alarmEnabled) && alarmEnabled[i] === false) continue;
                const ms = _timeUntilAlarm(alarms[i], i);
                if (!Number.isFinite(ms) || ms <= 0) continue;
                const when = new Date(Date.now() + ms);
                const alarmName = _normalizeAlarmName(alarmNames[i], i);
                notifications.push({
                    id: NATIVE_ALARM_NOTIFICATION_ID_BASE + i,
                    title: alarmName || 'Alarm',
                    body: `It is ${alarms[i]}`,
                    schedule: { at: when },
                    sound: NATIVE_ALARM_SOUND_FILE,
                    extra: {
                        type: 'alarm',
                        alarmIndex: i,
                        alarmTime: alarms[i],
                        alarmType: (alarmTypes && alarmTypes[i]) ? alarmTypes[i] : 'routine'
                    }
                });
            }
            return notifications;
        }

        async function registerNativeAlarmNotificationListeners() {
            const plugin = _getLocalNotificationsPlugin();
            if (!plugin || _nativeNotificationListenersBound || typeof plugin.addListener !== 'function') return;

            _nativeNotificationListenersBound = true;

            try {
                await plugin.addListener('localNotificationReceived', (notification) => {
                    const extra = notification?.extra || {};
                    if (extra?.type !== 'alarm') return;
                    queueNativeAlarmNotificationSync();
                });

                await plugin.addListener('localNotificationActionPerformed', (event) => {
                    const extra = event?.notification?.extra || {};
                    if (extra?.type !== 'alarm') return;
                    queueNativeAlarmNotificationSync();
                });
            } catch (e) {
                _nativeNotificationListenersBound = false;
                console.warn('Failed to register native notification listeners', e);
            }
        }

        async function syncNativeAlarmNotifications() {
            const plugin = _getLocalNotificationsPlugin();
            if (!plugin) return;
            const allowed = await _ensureNativeNotificationPermission();
            if (!allowed) return;
            try {
                await plugin.cancel({
                    notifications: Array.from({ length: Math.max(alarms.length, MAX_ALARMS) }, (_, i) => ({
                        id: NATIVE_ALARM_NOTIFICATION_ID_BASE + i
                    }))
                });
                const notifications = _buildNextNativeAlarmNotifications();
                if (notifications.length) {
                    await plugin.schedule({ notifications });
                }
            } catch (e) {
                console.warn('syncNativeAlarmNotifications failed', e);
            }
        }

        function queueNativeAlarmNotificationSync() {
            if (_nativeNotificationSyncTimer) {
                clearTimeout(_nativeNotificationSyncTimer);
                _nativeNotificationSyncTimer = null;
            }
            _nativeNotificationSyncTimer = setTimeout(() => {
                _nativeNotificationSyncTimer = null;
                syncNativeAlarmNotifications();
                const plugin = _getLocalNotificationsPlugin();
                if (plugin && plugin.getPending) {
                    plugin.getPending().then(console.log).catch(console.warn);
                }
            }, 220);
        }

        function initializeNativeAlarmNotifications() {
            registerNativeAlarmNotificationListeners();
            queueNativeAlarmNotificationSync();
        }

        function queueAlarmMutation(mutator, opts = {}) {
            const { render = true, save = true, renderReason = 'queued-mutation' } = opts;
            _alarmMutationPendingCount += 1;
            _setAlarmButtonBusy(true);

            _alarmMutationQueue = _alarmMutationQueue
                .then(() => {
                    if (!Array.isArray(alarms)) alarms = [];
                    if (typeof mutator === 'function') mutator();

                    _normalizeAlarmCollections();

                    if (Number.isInteger(editingAlarmIndex) && (editingAlarmIndex < 0 || editingAlarmIndex >= alarms.length)) {
                        editingAlarmIndex = null;
                        originalAlarmDraft = null;
                    }

                    if (render) {
                        if (typeof scheduleRender === 'function') scheduleRender('alarms', renderReason);
                        else renderAlarms();
                    }
                    if (save) saveState();
                })
                .catch((e) => {
                    console.error('queueAlarmMutation failed', e);
                })
                .finally(() => {
                    _alarmMutationPendingCount = Math.max(0, _alarmMutationPendingCount - 1);
                    _setAlarmButtonBusy(_alarmMutationPendingCount > 0);
                });

            return _alarmMutationQueue;
        }

        function _getRepeatDaysForAlarm(index) {
            if (Array.isArray(alarmsRepeatDays) && index >= 0 && index < alarmsRepeatDays.length) {
                return _normalizeRepeatDays(alarmsRepeatDays[index]);
            }
            const meta = (alarmsMeta && alarmsMeta[index]) ? alarmsMeta[index] : 'Everyday';
            return _legacyMetaToRepeatDays(meta);
        }
        function _normalizeRoutineAlarmLimit(value) {
            const n = Number(value);
            if (!Number.isInteger(n)) return 1;
            return Math.max(1, Math.min(3, n));
        }
        function _countRoutineAlarms(excludeIndex = null) {
            if (!Array.isArray(alarmTypes)) return 0;
            return alarmTypes.reduce((count, t, idx) => (
                (idx !== excludeIndex && t === 'routine') ? (count + 1) : count
            ), 0);
        }
        function _canSelectRoutineType(excludeIndex = null) {
            return _countRoutineAlarms(excludeIndex) < maxRoutineAlarms;
        }
        function _updateRoutineLimitControls() {
            [1, 2, 3].forEach(n => {
                const btn = document.getElementById(`routine-limit-${n}`);
                if (!btn) return;
                btn.classList.toggle('active', maxRoutineAlarms === n);
            });
        }
        function setRoutineAlarmLimit(limit) {
            maxRoutineAlarms = _normalizeRoutineAlarmLimit(limit);
            _normalizeAlarmCollections();
            _updateRoutineLimitControls();
            if (selectedAlarmType === 'routine' && !_canSelectRoutineType(Number.isInteger(editingAlarmIndex) ? editingAlarmIndex : null)) {
                selectedAlarmType = 'regular';
            }
            setAlarmType(selectedAlarmType);
            renderAlarms();
            saveState();
        }

        function _serializeTimersForState() {
            if (!Array.isArray(_timers)) return [];
            return _timers.map(t => ({
                id: String(t.id),
                label: String(t.label || ''),
                total: Math.max(0, Number(t.total) || 0),
                setDurationMs: Math.max(0, Number(t.setDurationMs) || Number(t.total) || 0),
                remaining: Math.max(0, Number(t.remaining) || 0),
                skipHistoryOnFinish: !!t.skipHistoryOnFinish,
                active: !!t.active,
                endAt: t.active ? Math.max(Date.now(), Number(t.endAt) || (Date.now() + Math.max(0, Number(t.remaining) || 0))) : null
            }));
        }

        function _serializeStopwatchForState() {
            const elapsedNow = _sw_elapsed + (_sw_running ? (Date.now() - _sw_start) : 0);
            return {
                running: !!_sw_running,
                elapsed: Math.max(0, elapsedNow)
            };
        }

        function saveState() {
            try {
                const customSounds = SOUND_OPTIONS
                    .filter(s => s && s.isCustom && typeof s.audioUrl === 'string' && s.audioUrl.startsWith('data:'))
                    .map(s => ({
                        id: String(s.id),
                        name: String(s.name || 'Imported Sound'),
                        description: String(s.description || 'Imported sound'),
                        audioUrl: s.audioUrl
                    }));

                const state = {
                    version: 1,
                    savedAt: Date.now(),
                    tasks: _normalizeTaskList(tasks),
                    alarms: Array.isArray(alarms) ? alarms.map(a => String(a || '')).filter(Boolean) : [],
                    alarmNames: Array.isArray(alarmNames) ? alarmNames.map((n, i) => _normalizeAlarmName(n, i)) : [],
                    alarmsMeta: Array.isArray(alarmsMeta) ? alarmsMeta.map(d => String(d || 'Everyday')) : [],
                    alarmsRepeatDays: Array.isArray(alarmsRepeatDays) ? alarmsRepeatDays.map(days => _normalizeRepeatDays(days)) : [],
                    alarmTypes: Array.isArray(alarmTypes) ? alarmTypes.map(t => (t === 'regular' ? 'regular' : 'routine')) : [],
                    alarmSoundIds: Array.isArray(alarmSoundIds) ? alarmSoundIds.map(id => _normalizeAlarmSoundId(id)) : [],
                    alarmEnabled: Array.isArray(alarmEnabled) ? alarmEnabled.map(v => !!v) : [],
                    selectedAlarmType: selectedAlarmType === 'regular' ? 'regular' : 'routine',
                    maxRoutineAlarms: _normalizeRoutineAlarmLimit(maxRoutineAlarms),
                    selectedSound: String(selectedSound || DEFAULT_SOUND_ID),
                    selectedBackground: String(selectedBackground || DEFAULT_BACKGROUND_ID),
                    selectedSkyMode: selectedSkyMode === 'day' ? 'day' : DEFAULT_SKY_MODE,
                    customSounds,
                    timers: _serializeTimersForState(),
                    previousTimerHistory: Array.isArray(previousTimerHistory)
                        ? previousTimerHistory.map(_normalizeTimerHistoryEntry).filter(Boolean).slice(0, MAX_TIMER_HISTORY)
                        : [],
                    stopwatch: _serializeStopwatchForState()
                };
                localStorage.setItem(APP_STATE_STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.warn('Failed to save app state', e);
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(APP_STATE_STORAGE_KEY);
                if (!raw) return null;
                const parsed = _safeParseJSON(raw);
                if (!parsed || typeof parsed !== 'object') return null;
                return parsed;
            } catch (e) {
                console.warn('Failed to load app state', e);
                return null;
            }
        }

        function initializeState() {
            const state = loadState();

            SOUND_OPTIONS = BASE_SOUND_OPTIONS.map(s => ({ ...s }));

            if (!state) {
                tasks = createDefaultTasks();
                alarms = [];
                alarmNames = [];
                alarmsMeta = [];
                alarmsRepeatDays = [];
                alarmTypes = [];
                alarmSoundIds = [];
                alarmEnabled = [];

            tasks = _normalizeTaskList(state.tasks);
            alarms = Array.isArray(state.alarms) ? state.alarms.map(a => String(a || '')).filter(Boolean) : [];
            alarmNames = Array.isArray(state.alarmNames) ? state.alarmNames.map((n, i) => _normalizeAlarmName(n, i)) : [];
            alarmsMeta = Array.isArray(state.alarmsMeta) ? state.alarmsMeta.map(v => String(v || 'Everyday')) : [];
            alarmsRepeatDays = Array.isArray(state.alarmsRepeatDays)
                ? state.alarmsRepeatDays.map(_normalizeRepeatDays)
                : alarms.map((_, idx) => _legacyMetaToRepeatDays(alarmsMeta[idx]));
            alarmTypes = Array.isArray(state.alarmTypes) ? state.alarmTypes.map(v => (v === 'regular' ? 'regular' : 'routine')) : [];
            alarmSoundIds = Array.isArray(state.alarmSoundIds) ? state.alarmSoundIds.map(_normalizeAlarmSoundId) : [];
            alarmEnabled = Array.isArray(state.alarmEnabled) ? state.alarmEnabled.map(v => !!v) : [];
            maxRoutineAlarms = _normalizeRoutineAlarmLimit(
                state.maxRoutineAlarms !== undefined ? state.maxRoutineAlarms : state.dailyAlarmLimit
            );
            previousTimerHistory = Array.isArray(state.previousTimerHistory)
                ? state.previousTimerHistory.map(_normalizeTimerHistoryEntry).filter(Boolean).slice(0, MAX_TIMER_HISTORY)
                : [];

            while (alarmNames.length < alarms.length) alarmNames.push(_defaultAlarmName(alarmNames.length));
            while (alarmsMeta.length < alarms.length) alarmsMeta.push('Everyday');
            while (alarmsRepeatDays.length < alarms.length) alarmsRepeatDays.push([...ALL_DAY_INDICES]);
            while (alarmTypes.length < alarms.length) alarmTypes.push('routine');
            while (alarmSoundIds.length < alarms.length) alarmSoundIds.push(DEFAULT_SOUND_ID);
            while (alarmEnabled.length < alarms.length) alarmEnabled.push(true);
            if (alarmNames.length > alarms.length) alarmNames = alarmNames.slice(0, alarms.length);
            if (alarmsMeta.length > alarms.length) alarmsMeta = alarmsMeta.slice(0, alarms.length);
            if (alarmsRepeatDays.length > alarms.length) alarmsRepeatDays = alarmsRepeatDays.slice(0, alarms.length);
            if (alarmTypes.length > alarms.length) alarmTypes = alarmTypes.slice(0, alarms.length);
            if (alarmSoundIds.length > alarms.length) alarmSoundIds = alarmSoundIds.slice(0, alarms.length);
            if (alarmEnabled.length > alarms.length) alarmEnabled = alarmEnabled.slice(0, alarms.length);
            alarmNames = alarmNames.map((n, i) => _normalizeAlarmName(n, i));
            alarmsRepeatDays = alarmsRepeatDays.map(_normalizeRepeatDays);
            alarmsMeta = alarmsRepeatDays.map(days => _formatRepeatDays(days));
            alarmSoundIds = alarmSoundIds.map(_normalizeAlarmSoundId);
            _normalizeAlarmCollections();

            selectedAlarmType = state.selectedAlarmType === 'regular' ? 'regular' : 'routine';

            const customSounds = Array.isArray(state.customSounds) ? state.customSounds : [];
            customSounds.forEach(cs => {
                if (!cs || typeof cs !== 'object') return;
                if (typeof cs.audioUrl !== 'string' || !cs.audioUrl.startsWith('data:')) return;
                const id = String(cs.id || `custom-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`);
                if (SOUND_OPTIONS.some(s => s.id === id)) return;
                SOUND_OPTIONS.unshift({
                    id,
                    name: String(cs.name || 'Imported Sound'),
                    description: String(cs.description || 'Imported sound'),
                    audioUrl: cs.audioUrl,
                    isCustom: true
                });
            });

            const soundExists = SOUND_OPTIONS.some(s => s.id === state.selectedSound);
            selectedSound = soundExists ? state.selectedSound : DEFAULT_SOUND_ID;
            const bgExists = BACKGROUND_OPTIONS.some(bg => bg.id === state.selectedBackground);
            selectedBackground = bgExists ? state.selectedBackground : DEFAULT_BACKGROUND_ID;
            selectedSkyMode = state.selectedSkyMode === 'day' ? 'day' : DEFAULT_SKY_MODE;
            applyBackground(selectedBackground, false);

            _timers.splice(0, _timers.length);
            const now = Date.now();
            const persistedTimers = Array.isArray(state.timers) ? state.timers : [];
            persistedTimers.forEach(pt => {
                if (!pt || typeof pt !== 'object') return;
                const timer = {
                    id: String(pt.id || `${Date.now()}-${Math.random().toString(36).slice(2, 6)}`),
                    label: String(pt.label || ''),
                    total: Math.max(0, Number(pt.total) || 0),
                    setDurationMs: Math.max(0, Number(pt.setDurationMs) || Number(pt.total) || 0),
                    remaining: Math.max(0, Number(pt.remaining) || 0),
                    skipHistoryOnFinish: !!pt.skipHistoryOnFinish,
                    interval: null,
                    active: !!pt.active,
                    endAt: null
                };
                if (timer.total <= 0 && timer.remaining <= 0) return;

                if (timer.active) {
                    const restoredEndAt = Number(pt.endAt) || (now + timer.remaining);
                    timer.remaining = Math.max(0, restoredEndAt - now);
                    timer.endAt = restoredEndAt;
                    if (timer.remaining === 0) {
                        timer.active = false;
                        timer.endAt = null;
                    }
                }

                _timers.push(timer);
            });

            if (_sw_tick) { clearInterval(_sw_tick); _sw_tick = null; }
            _sw_running = false;
            _sw_elapsed = 0;
            _sw_start = 0;
            if (state.stopwatch && typeof state.stopwatch === 'object') {
                _sw_elapsed = Math.max(0, Number(state.stopwatch.elapsed) || 0);
                if (state.stopwatch.running) {
                    _sw_running = true;
                    _sw_start = Date.now();
                    _sw_tick = setInterval(_sw_render, 60);
                }
            }

            _timers.forEach(timer => {
                if (timer.active && timer.remaining > 0) {
                    _startTimerInterval(timer, { preserveEndAt: true, persist: false });
                }
            });
            const swBtn = document.getElementById('sw-start');
            if (swBtn) swBtn.textContent = _sw_running ? 'Stop' : 'Start';
        }

        function _renderInfiniteWheel(wheel, values, opts = {}) {
            if (!wheel) return;
            const copyCount = Math.max(9, Number(opts.copyCount) || 15);
            const normalizedValues = Array.isArray(values) ? values.map(v => String(v)) : [];
            const valueCount = normalizedValues.length;
            if (valueCount === 0) {
                wheel.innerHTML = '';
                return;
            }
            let markup = '';
            for (let copy = 0; copy < copyCount; copy += 1) {
                for (let idx = 0; idx < valueCount; idx += 1) {
                    const value = normalizedValues[idx];
                    markup += `<div class="wheel-item" data-wheel-value="${value}" data-wheel-index="${idx}">${value}</div>`;
                }
            }
            wheel.innerHTML = markup;
            wheel.dataset.infinite = 'true';
            wheel.dataset.wheelValueCount = String(valueCount);
            wheel.dataset.wheelCopyCount = String(copyCount);
            wheel.dataset.wheelMiddleStart = String(Math.floor(copyCount / 2) * valueCount);
            wheel._wheelItems = Array.from(wheel.querySelectorAll('.wheel-item'));
            wheel._wheelRafId = null;
            wheel._wheelIdleTimeout = null;
            wheel._wheelActiveItem = null;
        }

        function _renderFiniteWheel(wheel, values) {
            if (!wheel) return;
            const normalizedValues = Array.isArray(values) ? values.map(v => String(v)) : [];
            let markup = '<div class="wheel-spacer" aria-hidden="true"></div>';
            normalizedValues.forEach((value, idx) => {
                markup += `<div class="wheel-item" data-wheel-value="${value}" data-wheel-index="${idx}">${value}</div>`;
            });
            markup += '<div class="wheel-spacer" aria-hidden="true"></div>';
            wheel.innerHTML = markup;
            delete wheel.dataset.infinite;
            delete wheel.dataset.wheelValueCount;
            delete wheel.dataset.wheelCopyCount;
            delete wheel.dataset.wheelMiddleStart;
            wheel._wheelItems = Array.from(wheel.querySelectorAll('.wheel-item'));
            wheel._wheelRafId = null;
            wheel._wheelIdleTimeout = null;
            wheel._wheelActiveItem = null;
        }

        function _getWheelItems(wheel) {
            if (!wheel) return [];
            if (Array.isArray(wheel._wheelItems) && wheel._wheelItems.length) return wheel._wheelItems;
            wheel._wheelItems = Array.from(wheel.querySelectorAll('.wheel-item'));
            return wheel._wheelItems;
        }

        function _getWheelGeometry(wheel) {
            const items = _getWheelItems(wheel);
            if (!items.length) return null;
            const first = items[0];
            const horizontal = wheel.classList.contains('wheel-horizontal');
            if (horizontal) {
                const itemWidth = first.offsetWidth || 70;
                const firstCenter = first.offsetLeft + (itemWidth / 2);
                return { items, horizontal: true, itemWidth, firstCenter };
            }
            const itemHeight = first.offsetHeight || 40;
            const firstCenter = first.offsetTop + (itemHeight / 2);
            return { items, horizontal: false, itemHeight, firstCenter };
        }

        function _getWheelCenteredAbsoluteIndex(wheel) {
            const geometry = _getWheelGeometry(wheel);
            if (!geometry) return -1;
            const centerPoint = geometry.horizontal
                ? (wheel.scrollLeft + (wheel.clientWidth / 2))
                : (wheel.scrollTop + (wheel.clientHeight / 2));
            const unit = geometry.horizontal ? geometry.itemWidth : geometry.itemHeight;
            const raw = Math.round((centerPoint - geometry.firstCenter) / unit);
            return Math.max(0, Math.min(geometry.items.length - 1, raw));
        }

        function _getWheelCenteredItem(wheel) {
            const items = _getWheelItems(wheel);
            if (!items.length) return null;
            const centeredIdx = _getWheelCenteredAbsoluteIndex(wheel);
            return centeredIdx >= 0 ? items[centeredIdx] : null;
        }

        function _setWheelActiveItem(wheel, item) {
            if (!wheel || !item) return;
            if (wheel._wheelActiveItem === item) return;
            if (wheel._wheelActiveItem) wheel._wheelActiveItem.classList.remove('active');
            item.classList.add('active');
            wheel._wheelActiveItem = item;
        }

        function _centerWheelOnItem(wheel, item, behavior = 'auto') {
            if (!wheel || !item) return;
            const horizontal = wheel.classList.contains('wheel-horizontal');
            const target = horizontal
                ? item.offsetLeft - ((wheel.clientWidth - item.offsetWidth) / 2)
                : item.offsetTop - ((wheel.clientHeight - item.offsetHeight) / 2);
            const finalPos = Math.max(0, target);
            const currentPos = horizontal ? wheel.scrollLeft : wheel.scrollTop;
            if (Math.abs(currentPos - finalPos) < 0.5) return;
            if (behavior === 'smooth') {
                wheel.scrollTo(horizontal ? { left: finalPos, behavior: 'smooth' } : { top: finalPos, behavior: 'smooth' });
                return;
            }
            if (horizontal) wheel.scrollLeft = finalPos;
            else wheel.scrollTop = finalPos;
        }

        function _recenterInfiniteWheel(wheel) {
            if (!wheel || wheel.dataset.infinite !== 'true') return;
            const valueCount = Number(wheel.dataset.wheelValueCount) || 0;
            const copyCount = Number(wheel.dataset.wheelCopyCount) || 0;
            if (!valueCount || copyCount < 3) return;
            const geometry = _getWheelGeometry(wheel);
            if (!geometry) return;
            const sourceIdx = _getWheelCenteredAbsoluteIndex(wheel);
            if (sourceIdx < 0) return;
            const baseIndex = sourceIdx % valueCount;
            const cycle = Math.floor(sourceIdx / valueCount);
            const middleCycle = Math.floor(copyCount / 2);
            if (Math.abs(cycle - middleCycle) <= 1) return;
            const targetAbsoluteIdx = (middleCycle * valueCount) + baseIndex;
            const deltaItems = targetAbsoluteIdx - sourceIdx;
            if (geometry.horizontal) wheel.scrollLeft += (deltaItems * geometry.itemWidth);
            else wheel.scrollTop += (deltaItems * geometry.itemHeight);
        }

        function _maintainInfiniteWheelLoop(wheel) {
            if (!wheel || wheel.dataset.infinite !== 'true') return;
            const valueCount = Number(wheel.dataset.wheelValueCount) || 0;
            const copyCount = Number(wheel.dataset.wheelCopyCount) || 0;
            if (!valueCount || copyCount < 5) return;
            const geometry = _getWheelGeometry(wheel);
            if (!geometry) return;
            const sourceIdx = _getWheelCenteredAbsoluteIndex(wheel);
            if (sourceIdx < 0) return;
            const cycle = Math.floor(sourceIdx / valueCount);
            const middleCycle = Math.floor(copyCount / 2);
            const minSafeCycle = 2;
            const maxSafeCycle = copyCount - 3;
            if (cycle >= minSafeCycle && cycle <= maxSafeCycle) return;
            const baseIndex = sourceIdx % valueCount;
            const targetAbsoluteIdx = (middleCycle * valueCount) + baseIndex;
            const deltaItems = targetAbsoluteIdx - sourceIdx;
            if (geometry.horizontal) wheel.scrollLeft += (deltaItems * geometry.itemWidth);
            else wheel.scrollTop += (deltaItems * geometry.itemHeight);
        }

        function _updateWheelVisualOnFrame(wheel) {
            if (!wheel) return;
            const centered = _getWheelCenteredItem(wheel);
            if (centered) _setWheelActiveItem(wheel, centered);
        }

        function _queueWheelVisualUpdate(wheel) {
            if (!wheel) return;
            if (wheel._wheelRafId) return;
            wheel._wheelRafId = requestAnimationFrame(() => {
                wheel._wheelRafId = null;
                _updateWheelVisualOnFrame(wheel);
            });
        }

        function _finalizeWheelAfterScroll(wheel) {
            if (!wheel) return;
            if (wheel.dataset.infinite === 'true') _recenterInfiniteWheel(wheel);
            const centered = _getWheelCenteredItem(wheel);
            if (centered) {
                _centerWheelOnItem(wheel, centered, 'smooth');
                _setWheelActiveItem(wheel, centered);
            }
        }

        function _refreshAllPickerWheels() {
            const wheelIds = ['h-wheel', 'm-wheel', 'timer-hour-wheel', 'timer-min-wheel', 'timer-sec-wheel'];
            wheelIds.forEach(id => {
                const wheel = document.getElementById(id);

        function initPickerWheels() {
            const wheels = {

            _renderInfiniteWheel(wheels.timerHour, Array.from({ length: 24 }, (_, i) => String(i)));

            _renderInfiniteWheel(wheels.timerSec, Array.from({ length: 60 }, (_, i) => String(i).padStart(2, '0')));

            Object.values(wheels).forEach(wheel => {
                if (wheel) {
                    wheel.addEventListener('dragstart', (evt) => {
                        evt.preventDefault();

                    wheel.addEventListener('scroll', () => {
                        _maintainInfiniteWheelLoop(wheel);
                        _queueWheelVisualUpdate(wheel);
                        if (_alarmComposerOpen && (wheel.id === 'h-wheel' || wheel.id === 'm-wheel')) {
                            _syncHomeClockWithCreatorSelection();

                        clearTimeout(wheel._wheelIdleTimeout);
                        wheel._wheelIdleTimeout = setTimeout(() => _finalizeWheelAfterScroll(wheel), 140);

            setTimeout(() => {
                _scrollWheelToValue('h-wheel', '12');
                _scrollWheelToValue('m-wheel', '00');
                setCreatorDaySelection(EVERY_DAY_LABEL);
                setCreatorPeriodSelection('AM');
                _syncHomeClockWithCreatorSelection();
                _scrollWheelToValue('timer-hour-wheel', '0');
                _scrollWheelToValue('timer-min-wheel', '0');
                _scrollWheelToValue('timer-sec-wheel', '00');
                Object.values(wheels).forEach(w => {
                    if (w) _finalizeWheelAfterScroll(w);
                });
                requestAnimationFrame(() => requestAnimationFrame(_refreshAllPickerWheels));
            }, 120);
        }

        function handleWheelSnap(wheel) {

        function _setHomeClockToTime(hours24, minutes = 0, seconds = 0) {
            const hourHand = document.getElementById('home-clock-hour');
            const minuteHand = document.getElementById('home-clock-minute');
            const secondHand = document.getElementById('home-clock-second');
            if (!hourHand || !minuteHand || !secondHand) return;

            const safeSeconds = Number(seconds) || 0;
            const safeMinutes = (Number(minutes) || 0) + (safeSeconds / 60);
            const safeHours = ((Number(hours24) || 0) % 12) + (safeMinutes / 60);
            hourHand.style.transform = `rotate(${(safeHours * 30) - 90}deg)`;
            minuteHand.style.transform = `rotate(${(safeMinutes * 6) - 90}deg)`;

        function initCloudsMotion() {
            if (_cloudRafId) {
                cancelAnimationFrame(_cloudRafId);
                _cloudRafId = null;
            }
            if (!_backgroundAnimationsEnabled) return;
            const clouds = Array.from(document.querySelectorAll('.cloud'));
            if (!clouds.length) return;
            const windDir = _sceneWindDirection || 1;

            const W = () => Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
            const H = () => Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);

            clouds.forEach(el => {
                const rect = el.getBoundingClientRect();
                const cs = getComputedStyle(el);
                const baseTransform = cs.transform && cs.transform !== 'none' ? cs.transform : '';

                const speed = 28 + Math.random() * 30; // 28-58 px/sec for calmer glide
                const dirX = windDir;
                const norm = Math.hypot(dirX, 0); // only horizontal movement

                el._cloud = {
                    baseTransform,
                    x: 0,
                    y: 0,
                    targetX: 0,
                    targetY: 0,
                    speed,
                    dir: { x: dirX / norm, y: 0 }, // no vertical movement
                    width: rect.width,
                    height: rect.height
                };

                el._cloud.x += (Math.random() * 120 - 60);
                el._cloud.y += (Math.random() * 60 - 30);
                el._cloud.targetX = el._cloud.x;
                el._cloud.targetY = el._cloud.y;
                el.style.transform = (baseTransform ? baseTransform + ' ' : '') + ` translate3d(${el._cloud.x}px, ${el._cloud.y}px, 0)`;
            });

            let last = performance.now();
            function step(now) {
                if (!_backgroundAnimationsEnabled) {
                    _cloudRafId = null;
                    return;
                }
                const dt = Math.min(100, now - last) / 1000; last = now;

                clouds.forEach(el => {
                    const d = el._cloud;
                    if (!d) return;
                    d.targetX += d.dir.x * d.speed * dt;
                    d.targetY += d.dir.y * d.speed * dt;
                    const lerp = 1 - Math.exp(-6.5 * dt);
                    d.x += (d.targetX - d.x) * lerp;
                    d.y += (d.targetY - d.y) * lerp;
                    el.style.transform = (d.baseTransform ? d.baseTransform + ' ' : '') + ` translate3d(${d.x}px, ${d.y}px, 0)`;

                    const rect = el.getBoundingClientRect();
                    const buf = Math.max(W(), H()) * 1.1;

                    if (!d._cloneCreated) {
                        if ((d.dir.x > 0 && rect.left > W()) || (d.dir.x < 0 && rect.right < 0)) {
                            const parent = el.parentNode || document.body;
                            const clone = el.cloneNode(true);
                            parent.appendChild(clone);

                            const offsetX = -Math.sign(d.dir.x) * (W() + rect.width + 120);
                            const cd = Object.assign({}, d);
                            cd.x = d.x + offsetX;
                            cd.targetX = cd.x;
                            cd.y = d.y + (Math.random() * 20 - 10);
                            cd.targetY = cd.y;
                            cd._cloneCreated = false;
                            cd.baseTransform = d.baseTransform;
                            clone._cloud = cd;
                            clone.style.transform = (cd.baseTransform ? cd.baseTransform + ' ' : '') + ` translate3d(${cd.x}px, ${cd.y}px, 0)`;
                            clouds.push(clone);
                            d._cloneCreated = true;
                        }
                    }

                    if (rect.right < -buf || rect.left > W() + buf || rect.bottom < -buf || rect.top > H() + buf) {
                        if (d._cloneCreated) {
                            d._remove = true; // mark for cleanup
                        } else {
                            reinitCloud(el);
                        }
                    }
                });

                for (let i = clouds.length - 1; i >= 0; i--) {
                    const c = clouds[i];
                    if (c && c._cloud && c._cloud._remove) {
                        try { if (c.parentNode) c.parentNode.removeChild(c); } catch (e) {}
                        clouds.splice(i, 1);
                    }
                }

                _cloudRafId = requestAnimationFrame(step);
            }

            function reinitCloud(el) {
                const d = el._cloud;
                if (!d) return;
                const startX = windDir > 0 ? - (W() * 1.05 + d.width) : (W() * 1.05 + d.width);
                const startY = d.y; // keep Y position fixed

                d.x = startX;
                d.y = startY;
                d.targetX = startX;
                d.targetY = startY;

                const dirX = windDir > 0 ? 1 : -1;
                d.dir = { x: dirX, y: 0 }; // only horizontal movement

                el.style.transform = (d.baseTransform ? d.baseTransform + ' ' : '') + ` translate3d(${d.x}px, ${d.y}px, 0)`;
            }

            _cloudRafId = requestAnimationFrame(step);
        }
